<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>영웅문S#</title>
<link rel="icon" href="/logo.png" type="image/png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;background:#0d1117;color:#e6edf3}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --surface3:#21283b;
  --border:#30363d;
  --border-light:#21262d;
  --t1:#e6edf3;
  --t2:#8b949e;
  --t3:#484f58;
  --up:#ff4757;--up-soft:rgba(255,71,87,.12);--up-glow:rgba(255,71,87,.25);
  --dn:#1e90ff;--dn-soft:rgba(30,144,255,.12);--dn-glow:rgba(30,144,255,.25);
  --accent:#58a6ff;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.app{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.hdr{
  padding:env(safe-area-inset-top,0) 0 0;
  padding-left:20px;padding-right:20px;
  padding-top:max(env(safe-area-inset-top,0px),12px);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg);z-index:20;position:relative;
  height:56px;flex-shrink:0;
}
.hdr .logo{display:flex;align-items:center;gap:10px}
.hdr .logo img{height:28px;object-fit:contain;filter:brightness(1.1)}
.hdr .logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.hdr-r{display:flex;gap:6px}
.hdr-r .ib{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.hdr-r .ib:active{transform:scale(.9);background:var(--surface2)}
.hdr-r .ib svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== TOP TABS ===== */
.tabs{display:flex;padding:4px 20px 0;gap:4px;background:var(--bg);z-index:10;flex-shrink:0}
.tabs button{
  padding:9px 16px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .2s;white-space:nowrap;
}
.tabs button.on{background:#e6edf3;color:#0d1117;box-shadow:0 2px 8px rgba(230,237,243,.15)}
.tabs button:not(.on){background:transparent;color:var(--t2)}
.tabs button:not(.on):active{background:var(--surface)}

/* ===== STATUS ===== */
.status{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px;font-size:11px;color:var(--t3);flex-shrink:0}
.status .lv{display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== CONTENT ===== */
.cnt{flex:1;overflow-y:auto;padding-bottom:88px;-webkit-overflow-scrolling:touch}

/* ===== HOME - Portfolio ===== */
.porto{padding:20px 20px 8px}
.porto .p-label{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:8px}
.porto .p-amt{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1.15;color:var(--t1)}
.porto .p-chg{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.porto .p-chg.up{color:var(--up);background:var(--up-soft)}
.porto .p-chg.dn{color:var(--dn);background:var(--dn-soft)}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 20px}
.g4{background:var(--surface);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border-light)}
.g4 .g4l{font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.g4 .g4v{font-size:16px;font-weight:700;letter-spacing:-.3px}
.g4 .g4v.up{color:var(--up)}.g4 .g4v.dn{color:var(--dn)}

.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 12px}
.sec-hd .sh-t{font-size:15px;font-weight:700}
.sec-hd .sh-cnt{font-size:12px;color:var(--t3);background:var(--surface);padding:3px 10px;border-radius:12px;font-weight:600}

/* Stock item (shared) */
.si{display:flex;align-items:center;padding:14px 20px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border-light)}
.si:last-child{border-bottom:none}
.si:active{background:var(--surface)}
.si .si-i{flex:1;min-width:0}
.si .si-n{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);letter-spacing:-.3px}
.si .si-sub{font-size:12px;color:var(--t3);margin-top:3px;font-weight:400}
.si .si-r{text-align:right;flex-shrink:0;padding-left:16px}
.si .si-p{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.si .si-c{font-size:12px;margin-top:3px;font-weight:600}
.si .si-c.up{color:var(--up)}.si .si-c.dn{color:var(--dn)}

/* ===== MARKET ===== */
.mf{display:flex;gap:6px;padding:12px 20px 8px}
.mf button{padding:8px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .2s}
.mf button:active{opacity:.7}
.mf button.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}

/* ===== NEWS ===== */
.nv{padding:0}
.news-hd{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.news-hd .nh-t{font-size:16px;font-weight:700;color:var(--t1)}
.news-hd .nh-ref{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;padding:6px 12px;border-radius:16px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15)}
.news-hd .nh-ref:active{opacity:.7}

.news-item{display:block;padding:16px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;text-decoration:none;color:inherit}
.news-item:active{background:var(--surface)}
.news-item .ni-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.5;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item .ni-summary{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item .ni-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--t3)}
.news-item .ni-src{font-weight:600;color:var(--t2)}
.news-item .ni-dot{width:2px;height:2px;border-radius:50%;background:var(--t3)}

.news-loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--t3);gap:10px;font-size:13px}
.news-empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px}

/* Chart (kept for market detail) */
.cw{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.ct{display:flex;padding:2px 4px;border-bottom:1px solid var(--border-light)}
.ct button{flex:1;padding:10px 0;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .15s;position:relative;border-radius:var(--radius-xs)}
.ct button:active{background:var(--surface2)}
.ct button.on{color:var(--accent)}
.ct button.on::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:1px}
.ca{padding:16px;height:200px;position:relative}
.ca canvas{width:100%;height:100%}
.cl{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:13px;gap:8px}
.ci{display:flex;justify-content:space-between;padding:0 16px 14px;font-size:11px;color:var(--t3);font-weight:500}

/* ===== BALANCE (잔고) ===== */
.bal{padding:16px 20px}
.bal-sec{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.bal-sec .bs-hd{padding:14px 18px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border-light);color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.bal-sec .bs-hd .bs-icon{display:flex;align-items:center;gap:8px}
.bal-sec .bs-hd .bs-icon::before{content:'';width:3px;height:12px;border-radius:2px}
.bal-sec.stock .bs-hd .bs-icon::before{background:var(--up)}
.bal-sec.saving .bs-hd .bs-icon::before{background:#3fb950}
.bal-sec .bs-hd .bs-total{font-size:13px;font-weight:700;color:var(--t1)}

/* Stock balance table */
.bal-tbl{width:100%;border-collapse:collapse}
.bal-tbl th{padding:8px 12px;font-size:11px;color:var(--t3);font-weight:500;text-align:right;background:var(--surface2);border-bottom:1px solid var(--border-light)}
.bal-tbl th:first-child{text-align:left;padding-left:18px}
.bal-tbl td{padding:10px 12px;font-size:13px;font-weight:600;text-align:right;border-bottom:1px solid var(--border-light);color:var(--t1)}
.bal-tbl td:first-child{text-align:left;padding-left:18px;font-weight:700;color:var(--t1)}
.bal-tbl tr:last-child td{border-bottom:none}
.bal-tbl .up{color:var(--up)}.bal-tbl .dn{color:var(--dn)}

/* Savings list */
.sav-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border-light)}
.sav-item:last-child{border-bottom:none}
.sav-l .sav-name{font-size:14px;font-weight:600;color:var(--t1)}
.sav-l .sav-sub{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:8px;align-items:center}
.sav-l .sav-sub .sav-rate{color:#3fb950;font-weight:600}
.sav-r{text-align:right}
.sav-r .sav-amt{font-size:14px;font-weight:700;color:var(--t1)}
.sav-r .sav-int{font-size:11px;color:#3fb950;margin-top:3px;font-weight:600}

.sav-add{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;border-top:1px solid var(--border-light);transition:background .1s}
.sav-add:active{background:var(--surface2)}
.sav-add svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round}

/* Savings modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;max-width:430px;width:100%;padding:24px 20px env(safe-area-inset-bottom,20px);border:1px solid var(--border);border-bottom:none}
.modal .m-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--t1)}
.modal .m-row{margin-bottom:12px}
.modal .m-row label{display:block;font-size:12px;color:var(--t3);margin-bottom:6px;font-weight:500}
.modal .m-row input,.modal .m-row select{width:100%;padding:12px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:14px;color:var(--t1);font-family:inherit}
.modal .m-row input:focus,.modal .m-row select:focus{outline:none;border-color:var(--accent)}
.modal .m-btns{display:flex;gap:8px;margin-top:18px}
.modal .m-btns button{flex:1;padding:14px;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.modal .m-btns .m-cancel{background:var(--surface3);color:var(--t2)}
.modal .m-btns .m-ok{background:var(--accent);color:#fff}
.modal .m-btns button:active{opacity:.8}

/* ===== SETTINGS ===== */
.stv{padding:20px}
.sc{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.sc .sh{padding:16px 20px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border-light);color:var(--t2);display:flex;align-items:center;gap:8px}
.sc .sh::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border-light)}
.sr:last-child{border-bottom:none}
.sr label{font-size:13px;color:var(--t3)}
.sr .srv{font-size:14px;font-weight:700;color:var(--t1)}
.sn{font-size:12px;color:var(--t3);line-height:1.6;padding:0 4px}

/* ===== BOTTOM NAV ===== */
.bn{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;display:flex;
  background:rgba(13,17,23,.92);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border-light);
  padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100;
}
.bn button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:6px 0;transition:all .15s}
.bn button:active{transform:scale(.9)}
.bn button svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.bn button .bl{font-size:10px;color:var(--t3);font-weight:500;transition:all .2s}
.bn button.on svg{stroke:var(--t1);stroke-width:2}
.bn button.on .bl{color:var(--t1);font-weight:700}

/* ===== COMMON ===== */
.empty{text-align:center;padding:56px 20px;color:var(--t3);font-size:14px;line-height:1.8}
.empty .ei{font-size:40px;margin-bottom:16px;opacity:.5}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);color:var(--t1);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;color:var(--t3);gap:16px;font-size:13px;font-weight:500}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err-page{padding:60px 24px;text-align:center}
.err-page .err-icon{font-size:40px;margin-bottom:20px;opacity:.5}
.err-page .err-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.err-page .err-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:28px}
.err-page .retry-btn{padding:13px 40px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.err-page .retry-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading"><div class="spinner"></div><div>시세 불러오는 중...</div></div>
</div>
<script>
let S=[],isLive=false,lastUpdate=null,serverError=false;
let st={tab:'home',hold:[],ot:'buy',sel:null,mf:'all',stxt:'',oq:0,op:0,pm:'market',toast:'',tt:null,savings:[],showSavModal:false};
let chartData=[],chartPeriod='1m',chartLoading=false,lastChartCode=null;
let newsData=[],newsLoading=false,newsFetched=false;

const F=n=>Math.round(n).toLocaleString('ko-KR');
function toast(m){st.toast=m;clearTimeout(st.tt);R();st.tt=setTimeout(()=>{st.toast='';R()},2200)}
function tp(){return st.hold.reduce((a,h)=>a+h.ap*h.q,0)}
function te(){return st.hold.reduce((a,h)=>{let s=S.find(x=>x.code===h.c);return a+(s?s.price:h.ap)*h.q},0)}
function pnl(){return te()-tp()}
function pnlP(){let p=tp();return p?((te()-p)/p*100):0}

function loadHoldings(){try{const s=localStorage.getItem('hls4_holdings');if(s)st.hold=JSON.parse(s)}catch(e){}}
function saveHoldings(){try{localStorage.setItem('hls4_holdings',JSON.stringify(st.hold))}catch(e){}}
function loadSavings(){try{const s=localStorage.getItem('hls4_savings');if(s)st.savings=JSON.parse(s)}catch(e){}}
function saveSavings(){try{localStorage.setItem('hls4_savings',JSON.stringify(st.savings))}catch(e){}}

const IC={
home:`<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
market:`<svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
news:`<svg viewBox="0 0 24 24"><path d="M4 4h16a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="13" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg>`,
more:`<svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>`,
bell:`<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
user:`<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
balance:`<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="14" x2="10" y2="14"/><line x1="6" y1="17" x2="8" y2="17"/></svg>`,
};

async function fetchPrices(){
  try{
    const res=await fetch('/api/prices');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.success){S=json.data;isLive=true;serverError=false;lastUpdate=new Date();R()}
  }catch(e){console.error('시세 조회 실패:',e.message);isLive=false;serverError=true;R()}
}

function timeAgo(){
  if(!lastUpdate)return '';
  const sec=Math.floor((Date.now()-lastUpdate.getTime())/1000);
  if(sec<5)return '방금';if(sec<60)return sec+'초 전';return Math.floor(sec/60)+'분 전';
}

async function fetchChart(code,period){
  chartLoading=true;lastChartCode=code;chartPeriod=period;R();
  try{
    const res=await fetch(`/api/chart?symbol=${code}&period=${period}`);
    const json=await res.json();
    if(json.success&&lastChartCode===code)chartData=json.data;
  }catch(e){chartData=[]}
  chartLoading=false;R();setTimeout(drawChart,50);
}

function drawChart(){
  const canvas=document.getElementById('stockChart');
  if(!canvas||chartData.length===0)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:16,r:14,b:28,l:14};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const closes=chartData.map(d=>d.close);
  const minP=Math.min(...closes),maxP=Math.max(...closes);
  const range=maxP-minP||1;
  ctx.clearRect(0,0,W,H);

  const isUp=closes[closes.length-1]>=closes[0];
  const lineColor=isUp?'#ff4757':'#1e90ff';

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(48,54,61,.4)';ctx.lineWidth=.5;
  for(let i=0;i<4;i++){
    const y=pad.t+cH*i/3;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  }

  // Fill gradient
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,isUp?'rgba(255,71,87,.15)':'rgba(30,144,255,.15)');
  grad.addColorStop(1,'rgba(13,17,23,0)');
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  // End dot
  const lastX=pad.l+((closes.length-1)/(closes.length-1))*cW;
  const lastY=pad.t+(1-(closes[closes.length-1]-minP)/range)*cH;
  ctx.beginPath();ctx.arc(lastX,lastY,3.5,0,Math.PI*2);ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(lastX,lastY,6,0,Math.PI*2);ctx.fillStyle=isUp?'rgba(255,71,87,.2)':'rgba(30,144,255,.2)';ctx.fill();

  // Price labels
  ctx.fillStyle='#484f58';ctx.font='500 10px -apple-system,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(F(maxP),W-pad.r,pad.t+4);
  ctx.fillText(F(minP),W-pad.r,H-pad.b-2);

  // Date labels
  ctx.textAlign='center';ctx.fillStyle='#484f58';
  const first=chartData[0].date.trim(),last=chartData[chartData.length-1].date.trim();
  let f1,f2;
  if(chartPeriod==='day'){
    f1=first.length>=12?first.substring(8,10)+':'+first.substring(10,12):first;
    f2=last.length>=12?last.substring(8,10)+':'+last.substring(10,12):last;
  }else{
    f1=first.substring(4,6)+'.'+first.substring(6,8);
    f2=last.substring(4,6)+'.'+last.substring(6,8);
  }
  ctx.fillText(f1,pad.l+30,H-8);ctx.fillText(f2,W-pad.r-30,H-8);
}

  h+=`<div class="status"><div class="lv"><span class="dot" style="background:${isLive?'#3fb950':'#ff4757'}"></span>${isLive?'실시간':'연결 끊김'}</div><div>${timeAgo()}</div></div>`;

  // Content
  h+='<div class="cnt">';
  if(st.tab==='home')h+=renderHome();
  else if(st.tab==='balance')h+=renderBalance();
  else if(st.tab==='news')h+=renderNews();
  else if(st.tab==='market')h+=renderMarket();
  else if(st.tab==='settings')h+=renderSettings();
  h+='</div>';

  // Toast
  h+=`<div class="toast ${st.toast?'show':''}">${st.toast}</div>`;

  // Bottom nav
  h+=`<div class="bn">
    <button class="${st.tab==='home'?'on':''}" onclick="T('home')">${IC.home}<span class="bl">홈</span></button>
    <button class="${st.tab==='balance'?'on':''}" onclick="T('balance')">${IC.balance}<span class="bl">잔고</span></button>
    <button class="${st.tab==='news'?'on':''}" onclick="T('news')">${IC.news}<span class="bl">뉴스</span></button>
    <button class="${st.tab==='market'?'on':''}" onclick="T('market')">${IC.market}<span class="bl">종목</span></button>
    <button class="${st.tab==='settings'?'on':''}" onclick="T('settings')">${IC.more}<span class="bl">더보기</span></button>
  </div>`;

  a.innerHTML=h;
}

  }else{
    st.hold.forEach(hd=>{
      let s=S.find(x=>x.code===hd.c),cur=s?s.price:hd.ap;
      let pl=(cur-hd.ap)*hd.q,pc=(cur-hd.ap)/hd.ap*100,isUp=pl>=0;

      </div>`;
    });
  }
  return h;
}

/* ===== BALANCE (잔고) ===== */
function renderBalance(){
  let h='<div class="bal">';
  let totalStock=te(),totalSav=st.savings.reduce((a,s)=>a+s.amount,0);
  let totalInterest=st.savings.reduce((a,s)=>{
    let days=Math.floor((Date.now()-s.startDate)/(1000*60*60*24));
    return a+Math.round(s.amount*s.rate/100/365*days);
  },0);

  // 주식 잔고 섹션
  h+=`<div class="bal-sec stock">
    <div class="bs-hd"><span class="bs-icon">주식 잔고</span><span class="bs-total">${F(totalStock)}원</span></div>`;
  if(st.hold.length===0){
    h+='<div style="padding:28px;text-align:center;color:var(--t3);font-size:13px">보유 주식이 없습니다</div>';
  }else{
    h+=`<table class="bal-tbl">
      <tr><th>종목명</th><th>수량</th><th>매입가</th><th>현재가</th><th>손익</th></tr>`;
    st.hold.forEach(hd=>{
      let s=S.find(x=>x.code===hd.c),cur=s?s.price:hd.ap;
      let pl=(cur-hd.ap)*hd.q,pc=(cur-hd.ap)/hd.ap*100,isUp=pl>=0;
      h+=`<tr>
        <td>${hd.n}</td>
        <td>${F(hd.q)}</td>
        <td>${F(hd.ap)}</td>
        <td>${F(cur)}</td>
        <td class="${isUp?'up':'dn'}">${isUp?'+':''}${F(Math.round(pl))}<br><span style="font-size:11px">${isUp?'+':''}${pc.toFixed(1)}%</span></td>
      </tr>`;
    });
    h+='</table>';
  }
  h+='</div>';

  // 적금 섹션
  h+=`<div class="bal-sec saving">
    <div class="bs-hd"><span class="bs-icon">적금 목록</span><span class="bs-total">${F(totalSav+totalInterest)}원</span></div>`;
  if(st.savings.length===0){
    h+='<div style="padding:28px;text-align:center;color:var(--t3);font-size:13px">등록된 적금이 없습니다</div>';
  }else{
    st.savings.forEach((s,i)=>{
      let days=Math.floor((Date.now()-s.startDate)/(1000*60*60*24));
      let interest=Math.round(s.amount*s.rate/100/365*days);
      let endDate=new Date(s.startDate+s.months*30*24*60*60*1000);
      let remaining=Math.max(0,Math.ceil((endDate.getTime()-Date.now())/(1000*60*60*24)));
      h+=`<div class="sav-item">
        <div class="sav-l">
          <div class="sav-name">${s.name}</div>
          <div class="sav-sub"><span class="sav-rate">연 ${s.rate}%</span><span>${s.months}개월 · 잔여 ${remaining}일</span></div>
        </div>
        <div class="sav-r">
          <div class="sav-amt">${F(s.amount)}원</div>
          <div class="sav-int">+${F(interest)}원</div>
        </div>
      </div>`;
    });
  }
  h+=`<div class="sav-add" onclick="openSavModal()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>적금 추가</div>`;
  h+='</div>';

  // 총 자산 합계
  h+=`<div class="bal-sec">
    <div class="bs-hd"><span class="bs-icon" style="color:var(--t1)">총 자산 합계</span></div>
    <div class="sr"><label>주식 평가금액</label><span class="srv">${F(totalStock)}원</span></div>
    <div class="sr"><label>적금 원금</label><span class="srv">${F(totalSav)}원</span></div>
    <div class="sr"><label>적금 이자 (예상)</label><span class="srv" style="color:#3fb950">+${F(totalInterest)}원</span></div>
    <div class="sr" style="background:var(--surface2)"><label style="font-weight:700;color:var(--t1)">총 합계</label><span class="srv" style="font-size:16px">${F(totalStock+totalSav+totalInterest)}원</span></div>
  </div>`;

  h+='</div>';

  // Savings modal
  if(st.showSavModal){
    h+=`<div class="modal-bg" onclick="closeSavModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="m-title">적금 추가</div>
        <div class="m-row"><label>적금명</label><input type="text" id="savName" placeholder="예: 청년희망적금"></div>
        <div class="m-row"><label>납입 금액 (원)</label><input type="number" id="savAmount" placeholder="100000"></div>
        <div class="m-row"><label>연이율 (%)</label><input type="number" id="savRate" placeholder="3.5" step="0.1"></div>
        <div class="m-row"><label>가입 기간 (개월)</label>
          <select id="savMonths"><option value="6">6개월</option><option value="12" selected>12개월</option><option value="24">24개월</option><option value="36">36개월</option></select>
        </div>
        <div class="m-btns">
          <button class="m-cancel" onclick="closeSavModal()">취소</button>
          <button class="m-ok" onclick="addSaving()">추가</button>
        </div>
      </div>
    </div>`;
  }

  return h;
}

function openSavModal(){st.showSavModal=true;R()}
function closeSavModal(){st.showSavModal=false;R()}
function addSaving(){
  const name=document.getElementById('savName').value.trim();
  const amount=parseInt(document.getElementById('savAmount').value)||0;
  const rate=parseFloat(document.getElementById('savRate').value)||0;
  const months=parseInt(document.getElementById('savMonths').value)||12;
  if(!name){toast('적금명을 입력해주세요');return}
  if(amount<=0){toast('금액을 입력해주세요');return}
  if(rate<=0){toast('이율을 입력해주세요');return}
  st.savings.push({name,amount,rate,months,startDate:Date.now()});
  saveSavings();st.showSavModal=false;toast(`${name} 적금 추가 완료`);R();
}
function delSaving(i){st.savings.splice(i,1);saveSavings();toast('적금 삭제 완료');R()}

/* ===== NEWS ===== */
async function fetchNews(){
  if(newsLoading)return;
  newsLoading=true;R();
  try{
    const res=await fetch('/api/news');
    const json=await res.json();
    if(json.success)newsData=json.data;
  }catch(e){console.error('뉴스 조회 실패:',e.message);newsData=[]}
  newsLoading=false;newsFetched=true;R();
}

function renderNews(){
  let h='<div class="nv">';
  h+=`<div class="news-hd"><span class="nh-t">증권 뉴스</span><span class="nh-ref" onclick="fetchNews()">새로고침</span></div>`;

  if(newsLoading){
    h+='<div class="news-loading"><div class="spinner" style="width:20px;height:20px"></div>뉴스 불러오는 중...</div>';
  }else if(newsData.length===0){
    h+='<div class="news-empty"><div style="font-size:36px;margin-bottom:12px;opacity:.4">📰</div>뉴스를 불러올 수 없습니다<br><span style="font-size:12px;color:var(--t3)">새로고침을 눌러주세요</span></div>';
  }else{
    newsData.forEach(n=>{
      h+=`<a class="news-item" href="${n.url}" target="_blank" rel="noopener">
        <div class="ni-title">${n.title}</div>
        ${n.summary?`<div class="ni-summary">${n.summary}</div>`:''}
        <div class="ni-meta">
          ${n.source?`<span class="ni-src">${n.source}</span>`:''}
          ${n.source&&n.date?'<span class="ni-dot"></span>':''}
          ${n.date?`<span>${n.date}</span>`:''}
        </div>
      </a>`;
    });
  }
  h+='</div>';return h;
}
