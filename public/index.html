<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2744">
<title>영웅문S#</title>
<link rel="icon" href="/logo.png" type="image/png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;background:#1a2744;color:#e8edf5}
:root{
  --bg:#1a2744;
  --surface:#223458;
  --surface2:#2a3d65;
  --surface3:#334972;
  --border:#3d5a8a;
  --border-light:#2e4a75;
  --t1:#f0f4fa;
  --t2:#a8bdd4;
  --t3:#708ab5;
  --up:#ff5a6a;--up-soft:rgba(255,90,106,.16);--up-glow:rgba(255,90,106,.3);
  --dn:#4db0ff;--dn-soft:rgba(77,176,255,.16);--dn-glow:rgba(77,176,255,.3);
  --accent:#7ec4ff;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.app{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== INDEX BAR ===== */
.idx-bar{
  display:flex;gap:0;overflow-x:auto;padding:5px 0;
  background:var(--surface);border-bottom:1px solid var(--border-light);
  flex-shrink:0;-webkit-overflow-scrolling:touch;
}
.idx-bar::-webkit-scrollbar{display:none}
.idx-item{display:flex;align-items:center;gap:5px;padding:0 13px;white-space:nowrap;border-right:1px solid var(--border-light);flex-shrink:0}
.idx-item:last-child{border-right:none}
.idx-item .idx-name{font-size:10px;font-weight:600;color:var(--t3)}
.idx-item .idx-val{font-size:11px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.idx-item .idx-chg{font-size:10px;font-weight:700;letter-spacing:-.2px}
.idx-item .idx-chg.up{color:var(--up)}
.idx-item .idx-chg.dn{color:var(--dn)}
.idx-item .idx-chg.flat{color:var(--t3)}

/* ===== HEADER ===== */
.hdr{
  padding-left:20px;padding-right:20px;
  padding-top:max(env(safe-area-inset-top,0px),8px);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg);z-index:20;position:relative;
  height:48px;flex-shrink:0;
}
.hdr .logo{display:flex;align-items:center;gap:8px}
.hdr .logo img{height:26px;object-fit:contain;filter:brightness(1.1)}
.hdr .logo-text{font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.hdr-r{display:flex;gap:6px}
.hdr-r .ib{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.hdr-r .ib:active{transform:scale(.9);background:var(--surface2)}
.hdr-r .ib svg{width:17px;height:17px;stroke:var(--t2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}


/* ===== STATUS ===== */
.status{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 3px;font-size:10px;color:var(--t3);flex-shrink:0}
.status .lv{display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== CONTENT ===== */
.cnt{flex:1;overflow-y:auto;padding-bottom:80px;-webkit-overflow-scrolling:touch}

/* ===== HOME - Portfolio ===== */
.porto{padding:10px 20px 4px}
.porto .p-label{font-size:10.5px;color:var(--t2);font-weight:500;margin-bottom:3px}
.porto .p-amt{font-size:22px;font-weight:800;letter-spacing:-.8px;line-height:1.2;color:var(--t1)}
.porto .p-chg{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:3px 9px;border-radius:12px;font-size:10.5px;font-weight:700}
.porto .p-chg.up{color:var(--up);background:var(--up-soft)}
.porto .p-chg.dn{color:var(--dn);background:var(--dn-soft)}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:6px 20px}
.g4{background:var(--surface);border-radius:var(--radius-xs);padding:9px 11px;border:1px solid var(--border-light)}
.g4 .g4l{font-size:9.5px;color:var(--t3);margin-bottom:3px;font-weight:500;letter-spacing:.2px}
.g4 .g4v{font-size:12px;font-weight:700;letter-spacing:-.3px}
.g4 .g4v.up{color:var(--up)}.g4 .g4v.dn{color:var(--dn)}

.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px}
.sec-hd .sh-t{font-size:12.5px;font-weight:700;letter-spacing:-.2px}
.sec-hd .sh-cnt{font-size:9.5px;color:var(--t3);background:var(--surface);padding:2px 7px;border-radius:9px;font-weight:600}

/* Stock item (shared) */
.si{display:flex;align-items:center;padding:12px 20px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border-light)}
.si:last-child{border-bottom:none}
.si:active{background:var(--surface)}
.si .si-i{flex:1;min-width:0}
.si .si-n{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);letter-spacing:-.3px}
.si .si-sub{font-size:11px;color:var(--t3);margin-top:2px;font-weight:400}
.si .si-r{text-align:right;flex-shrink:0;padding-left:14px}
.si .si-p{font-size:14px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.si .si-c{font-size:11px;margin-top:2px;font-weight:600}
.si .si-c.up{color:var(--up)}.si .si-c.dn{color:var(--dn)}

/* ===== MARKET ===== */
.mf{display:flex;gap:6px;padding:10px 20px 6px}
.mf button{padding:7px 14px;border-radius:18px;border:1px solid var(--border);background:transparent;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .2s}
.mf button:active{opacity:.7}
.mf button.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}

/* ===== NEWS ===== */
.nv{padding:0}
.news-hd{padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:center}
.news-hd .nh-t{font-size:15px;font-weight:700;color:var(--t1)}
.news-hd .nh-ref{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600;padding:5px 11px;border-radius:14px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15)}
.news-hd .nh-ref:active{opacity:.7}

.news-item{display:block;padding:13px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;text-decoration:none;color:inherit}
.news-item:active{background:var(--surface)}
.news-item .ni-title{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.5;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item .ni-summary{font-size:11.5px;color:var(--t2);margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item .ni-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:10.5px;color:var(--t3)}
.news-item .ni-src{font-weight:600;color:var(--t2)}
.news-item .ni-dot{width:2px;height:2px;border-radius:50%;background:var(--t3)}

.news-loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--t3);gap:10px;font-size:13px}
.news-empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px}

/* Chart (kept for market detail) */
.cw{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.ct{display:flex;padding:2px 4px;border-bottom:1px solid var(--border-light)}
.ct button{flex:1;padding:10px 0;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .15s;position:relative;border-radius:var(--radius-xs)}
.ct button:active{background:var(--surface2)}
.ct button.on{color:var(--accent)}
.ct button.on::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:1px}
.ca{padding:16px;height:200px;position:relative}
.ca canvas{width:100%;height:100%}
.cl{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:13px;gap:8px}
.ci{display:flex;justify-content:space-between;padding:0 16px 14px;font-size:11px;color:var(--t3);font-weight:500}

/* ===== BALANCE (잔고) ===== */
.bal{padding:14px 20px}
.bal-sec{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.bal-sec .bs-hd{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border-light);color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.bal-sec .bs-hd .bs-icon{display:flex;align-items:center;gap:8px}
.bal-sec .bs-hd .bs-icon::before{content:'';width:3px;height:11px;border-radius:2px}
.bal-sec.stock .bs-hd .bs-icon::before{background:var(--up)}
.bal-sec.saving .bs-hd .bs-icon::before{background:#3fb950}
.bal-sec .bs-hd .bs-total{font-size:12px;font-weight:700;color:var(--t1)}

/* Stock balance table */
.bal-tbl{width:100%;border-collapse:collapse}
.bal-tbl th{padding:7px 12px;font-size:10.5px;color:var(--t3);font-weight:500;text-align:right;background:var(--surface2);border-bottom:1px solid var(--border-light)}
.bal-tbl th:first-child{text-align:left;padding-left:16px}
.bal-tbl td{padding:9px 12px;font-size:12px;font-weight:600;text-align:right;border-bottom:1px solid var(--border-light);color:var(--t1)}
.bal-tbl td:first-child{text-align:left;padding-left:16px;font-weight:700;color:var(--t1)}
.bal-tbl tr:last-child td{border-bottom:none}
.bal-tbl .up{color:var(--up)}.bal-tbl .dn{color:var(--dn)}

/* Savings list */
.sav-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-light)}
.sav-item:last-child{border-bottom:none}
.sav-l .sav-name{font-size:13px;font-weight:600;color:var(--t1)}
.sav-l .sav-sub{font-size:10.5px;color:var(--t3);margin-top:2px;display:flex;gap:8px;align-items:center}
.sav-l .sav-sub .sav-rate{color:#3fb950;font-weight:600}
.sav-r{text-align:right}
.sav-r .sav-amt{font-size:13px;font-weight:700;color:var(--t1)}
.sav-r .sav-int{font-size:10.5px;color:#3fb950;margin-top:2px;font-weight:600}

.sav-add{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;border-top:1px solid var(--border-light);transition:background .1s}
.sav-add:active{background:var(--surface2)}
.sav-add svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round}

/* Savings modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;max-width:430px;width:100%;padding:24px 20px env(safe-area-inset-bottom,20px);border:1px solid var(--border);border-bottom:none}
.modal .m-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--t1)}
.modal .m-row{margin-bottom:12px}
.modal .m-row label{display:block;font-size:12px;color:var(--t3);margin-bottom:6px;font-weight:500}
.modal .m-row input,.modal .m-row select{width:100%;padding:12px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:14px;color:var(--t1);font-family:inherit}
.modal .m-row input:focus,.modal .m-row select:focus{outline:none;border-color:var(--accent)}
.modal .m-btns{display:flex;gap:8px;margin-top:18px}
.modal .m-btns button{flex:1;padding:14px;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.modal .m-btns .m-cancel{background:var(--surface3);color:var(--t2)}
.modal .m-btns .m-ok{background:var(--accent);color:#fff}
.modal .m-btns button:active{opacity:.8}
.modal .m-btns button:disabled{opacity:.35;cursor:not-allowed;background:var(--surface3)!important;color:var(--t3)!important}

/* ===== SETTINGS ===== */
.stv{padding:16px 20px}
.sc{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.sc .sh{padding:13px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border-light);color:var(--t2);display:flex;align-items:center;gap:8px}
.sc .sh::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--accent)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-light)}
.sr:last-child{border-bottom:none}
.sr label{font-size:12px;color:var(--t3)}
.sr .srv{font-size:13px;font-weight:700;color:var(--t1)}
.sn{font-size:11px;color:var(--t3);line-height:1.6;padding:0 4px}

/* ===== BOTTOM NAV ===== */
.bn{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;display:flex;
  background:rgba(26,39,68,.94);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border-light);
  padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100;
}
.bn button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:6px 0;transition:all .15s}
.bn button:active{transform:scale(.9)}
.bn button svg{width:20px;height:20px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.bn button .bl{font-size:10px;color:var(--t3);font-weight:500;transition:all .2s}
.bn button.on svg{stroke:var(--t1);stroke-width:2}
.bn button.on .bl{color:var(--t1);font-weight:700}

/* ===== COMMON ===== */
.empty{text-align:center;padding:56px 20px;color:var(--t3);font-size:14px;line-height:1.8}
.empty .ei{font-size:40px;margin-bottom:16px;opacity:.5}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);color:var(--t1);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== SPLASH LOADING ===== */
.splash{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
.splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-size:28px;font-weight:900;color:var(--t1);letter-spacing:-1px;margin-bottom:6px}
.splash-sub{font-size:12px;color:var(--t3);margin-bottom:40px;font-weight:500}
.splash-steps{width:260px;margin-bottom:30px}
.splash-step{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12px;color:var(--t3);transition:color .3s}
.splash-step.done{color:var(--accent)}
.splash-step.active{color:var(--t1)}
.splash-step .ss-icon{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .3s;flex-shrink:0}
.splash-step.done .ss-icon{background:var(--accent);border-color:var(--accent);color:#fff}
.splash-step.active .ss-icon{border-color:var(--accent);animation:pulse 1.2s infinite}
.splash-bar{width:260px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a5d8ff);border-radius:2px;transition:width .4s ease;width:0%}
.splash-ver{position:absolute;bottom:40px;font-size:11px;color:var(--t3)}


/* ===== QUICK MENU ===== */
.qm{display:flex;justify-content:space-around;padding:10px 20px 8px}
.qm-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.qm-item:active{opacity:.7;transform:scale(.95)}
.qm-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px}
.qm-icon.c1{background:rgba(255,90,106,.12)}
.qm-icon.c2{background:rgba(77,176,255,.12)}
.qm-icon.c3{background:rgba(63,185,80,.12)}
.qm-icon.c4{background:rgba(168,133,255,.12)}
.qm-label{font-size:10px;color:var(--t2);font-weight:500}

/* ===== HOT STOCKS ===== */
.hot-scroll{display:flex;gap:7px;padding:0 20px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.hot-scroll::-webkit-scrollbar{display:none}
.hot-card{flex-shrink:0;width:115px;background:var(--surface);border-radius:var(--radius-xs);padding:10px 11px;border:1px solid var(--border-light);cursor:pointer;transition:all .15s}
.hot-card:active{background:var(--surface2);transform:scale(.97)}
.hot-card .hc-name{font-size:11px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.hot-card .hc-price{font-size:11.5px;font-weight:700;color:var(--t1);margin-bottom:2px}
.hot-card .hc-chg{font-size:10px;font-weight:700}
.hot-card .hc-chg.up{color:var(--up)}.hot-card .hc-chg.dn{color:var(--dn)}

/* ===== BANNER ===== */
.banner{margin:6px 20px 8px;background:linear-gradient(135deg,#2a4a7f,#3d6baa);border-radius:var(--radius-xs);padding:13px 16px;position:relative;overflow:hidden;cursor:pointer}
.banner:active{opacity:.9}
.banner .bn-title{font-size:12.5px;font-weight:700;color:#fff;margin-bottom:2px}
.banner .bn-desc{font-size:10px;color:rgba(255,255,255,.7);font-weight:500}
.banner .bn-badge{position:absolute;top:10px;right:12px;font-size:8px;background:rgba(255,255,255,.2);color:#fff;padding:2px 7px;border-radius:8px;font-weight:600}
.banner::after{content:'';position:absolute;right:-20px;bottom:-20px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.06)}


/* ===== SUB PAGES ===== */
.sub-page{padding:16px 20px}
.sub-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;margin-bottom:14px}
.sub-back:active{opacity:.7}
.sub-back svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sub-title{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:14px;letter-spacing:-.5px}
.sub-card{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border-light);overflow:hidden;margin-bottom:10px}
.sub-card .sc-hd{padding:12px 14px;font-size:12px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:7px}
.sub-card .sc-hd::before{content:'';width:3px;height:10px;border-radius:2px;background:var(--accent)}
.sub-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border-light)}
.sub-row:last-child{border-bottom:none}
.sub-row .sr-l{font-size:11.5px;color:var(--t3)}
.sub-row .sr-v{font-size:12.5px;font-weight:700;color:var(--t1)}
.sub-row .sr-v.up{color:var(--up)}.sub-row .sr-v.dn{color:var(--dn)}.sub-row .sr-v.green{color:#3fb950}
.sub-empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:12px}
.sub-chart-placeholder{height:120px;background:var(--surface2);border-radius:var(--radius-xs);margin:10px 14px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:11px}
.sub-list-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border-light)}
.sub-list-item:last-child{border-bottom:none}
.sub-list-item .sli-l{display:flex;flex-direction:column;gap:2px}
.sub-list-item .sli-name{font-size:12.5px;font-weight:600;color:var(--t1)}
.sub-list-item .sli-desc{font-size:10.5px;color:var(--t3)}
.sub-list-item .sli-r{font-size:12.5px;font-weight:700;color:var(--t1)}
.sub-list-item .sli-r.green{color:#3fb950}

/* AI Recommendation styles */
.ai-score{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border-light)}
.ai-score:last-child{border-bottom:none}
.ai-score .ai-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.ai-score .ai-bar-fill{height:100%;border-radius:3px}
.ai-score .ai-name{font-size:11.5px;font-weight:600;color:var(--t1);width:65px;flex-shrink:0}
.ai-score .ai-pct{font-size:11.5px;font-weight:700;width:34px;text-align:right;flex-shrink:0}

.err-page{padding:60px 24px;text-align:center}
.err-page .err-icon{font-size:40px;margin-bottom:20px;opacity:.5}
.err-page .err-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.err-page .err-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:28px}
.err-page .retry-btn{padding:13px 40px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.err-page .retry-btn:active{opacity:.85}

/* ===== STOCK DETAIL MODAL ===== */
.sd-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sd-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;max-width:430px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none;padding-bottom:env(safe-area-inset-bottom,16px)}
.sd-handle{display:flex;justify-content:center;padding:12px 0 4px}
.sd-handle span{width:36px;height:4px;border-radius:2px;background:var(--border)}
.sd-close{position:absolute;top:12px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer}
.sd-close svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round}
.sd-close:active{opacity:.7}

.sd-top{padding:8px 20px 16px;position:relative}
.sd-name{font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.sd-code{font-size:12px;color:var(--t3);margin-top:3px;font-weight:500}
.sd-price-row{display:flex;align-items:baseline;gap:12px;margin-top:14px}
.sd-cur{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--t1)}
.sd-chg{font-size:14px;font-weight:700;display:flex;align-items:center;gap:4px}
.sd-chg.up{color:var(--up)}.sd-chg.dn{color:var(--dn)}

/* Detail chart */
.sd-chart-wrap{margin:0 20px 12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border-light);overflow:hidden}
.sd-ct{display:flex;padding:2px 4px;border-bottom:1px solid var(--border-light)}
.sd-ct button{flex:1;padding:9px 0;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;border-radius:6px;transition:all .15s}
.sd-ct button:active{background:var(--surface3)}
.sd-ct button.on{color:var(--accent)}
.sd-ct button.on::after{display:none}
.sd-ca{height:180px;padding:12px;position:relative}
.sd-ca canvas{width:100%;height:100%}

/* Detail info grid */
.sd-info{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-light);margin:0 20px 12px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-light)}
.sd-cell{background:var(--surface);padding:14px 16px}
.sd-cell .sd-label{font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:500}
.sd-cell .sd-val{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.sd-cell .sd-val.up{color:var(--up)}.sd-cell .sd-val.dn{color:var(--dn)}
.sd-cell .sd-val.green{color:#3fb950}

/* Holding detail section */
.sd-section{margin:0 20px 12px}
.sd-sec-title{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:8px;padding-left:2px;text-transform:uppercase;letter-spacing:.5px}
.sd-sec-card{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border-light);overflow:hidden}
.sd-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-light)}
.sd-row:last-child{border-bottom:none}
.sd-row .sd-rl{font-size:13px;color:var(--t2);font-weight:500}
.sd-row .sd-rv{font-size:14px;font-weight:700;color:var(--t1)}
.sd-row .sd-rv.up{color:var(--up)}.sd-row .sd-rv.dn{color:var(--dn)}

/* Transaction history */
.tx-tabs{display:flex;gap:4px;margin:0 20px 10px}
.tx-tabs button{padding:7px 14px;border-radius:16px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .15s}
.tx-tabs button.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.tx-tabs button:active{opacity:.7}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border-light)}
.tx-item:last-child{border-bottom:none}
.tx-l{display:flex;align-items:center;gap:10px}
.tx-badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
.tx-badge.buy{background:var(--up-soft);color:var(--up)}
.tx-badge.sell{background:var(--dn-soft);color:var(--dn)}
.tx-info .tx-price{font-size:13px;font-weight:600;color:var(--t1)}
.tx-info .tx-date{font-size:11px;color:var(--t3);margin-top:2px}
.tx-r{text-align:right}
.tx-r .tx-qty{font-size:13px;font-weight:700;color:var(--t1)}
.tx-r .tx-total{font-size:11px;color:var(--t3);margin-top:2px}
.tx-empty{text-align:center;padding:24px;color:var(--t3);font-size:13px}
.tx-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;cursor:pointer;color:var(--accent);font-size:12px;font-weight:600;border-top:1px solid var(--border-light);transition:background .1s}
.tx-add-btn:active{background:var(--surface2)}
.tx-add-btn svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round}

/* ===== sd-close 겹침 해소 ===== */
.sd-close{top:14px;right:14px;z-index:2}
.sd-handle{padding-top:10px}
.sd-sheet{padding-bottom:0!important}

/* ===== STOCK DETAIL 하단 액션바 (매수/매도) ===== */
.sd-actions{position:sticky;bottom:0;left:0;right:0;display:flex;gap:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px env(safe-area-inset-bottom,14px);gap:8px;z-index:5}
.sd-actions button{flex:1;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:opacity .15s;color:#fff}
.sd-actions button:active{opacity:.8;transform:scale(.98)}
.sd-actions .sd-buy{background:var(--up)}
.sd-actions .sd-sell{background:var(--dn)}
.sd-actions .sd-sell:disabled{background:var(--surface3);color:var(--t3);cursor:not-allowed}
.sd-pad{height:12px}

/* ===== TRADE MODAL (매수/매도) ===== */
.tm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:flex-end;justify-content:center}
.tm-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;max-width:430px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none;padding:18px 20px env(safe-area-inset-bottom,20px)}
.tm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tm-name-wrap{display:flex;flex-direction:column;gap:2px}
.tm-name{font-size:17px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.tm-code{font-size:11px;color:var(--t3);font-weight:500}
.tm-mode{font-size:13px;font-weight:800;padding:6px 14px;border-radius:14px}
.tm-mode.buy{background:var(--up-soft);color:var(--up)}
.tm-mode.sell{background:var(--dn-soft);color:var(--dn)}

.tm-price-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;border:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:flex-end}
.tm-pb-l .tm-pb-label{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:500}
.tm-pb-l .tm-pb-val{font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.tm-pb-r{font-size:12px;font-weight:700;text-align:right}
.tm-pb-r.up{color:var(--up)}.tm-pb-r.dn{color:var(--dn)}

.tm-label{font-size:11.5px;color:var(--t3);font-weight:600;margin-bottom:7px;display:block}
.tm-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tm-qty-btn{width:42px;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--t1);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tm-qty-btn:active{background:var(--surface3);transform:scale(.95)}
.tm-qty-input{flex:1;text-align:center;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--t1);font-size:17px;font-weight:800;font-family:inherit;letter-spacing:-.3px}
.tm-qty-input:focus{outline:none;border-color:var(--accent)}
.tm-qty-unit{font-size:13px;color:var(--t2);font-weight:600;padding:0 6px;flex-shrink:0}

.tm-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}
.tm-quick button{padding:9px 0;border:1px solid var(--border);background:var(--surface2);color:var(--t2);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
.tm-quick button:active{background:var(--surface3);color:var(--t1);transform:scale(.97)}

.tm-summary{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;border:1px solid var(--border-light)}
.tm-sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px}
.tm-sum-row .tms-l{color:var(--t3);font-weight:500}
.tm-sum-row .tms-v{color:var(--t1);font-weight:700}
.tm-sum-row .tms-v.up{color:var(--up)}.tm-sum-row .tms-v.dn{color:var(--dn)}
.tm-sum-row.total{border-top:1px solid var(--border-light);margin-top:4px;padding-top:9px}
.tm-sum-row.total .tms-l{color:var(--t2);font-weight:700;font-size:13px}
.tm-sum-row.total .tms-v{font-size:15px}

.tm-warn{font-size:11.5px;color:#f0a030;padding:9px 12px;background:rgba(240,160,48,.08);border:1px solid rgba(240,160,48,.18);border-radius:8px;margin-bottom:10px;text-align:center;font-weight:600}

.tm-submit{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;color:#fff;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:opacity .15s}
.tm-submit:active{opacity:.85}
.tm-submit.buy{background:var(--up)}
.tm-submit.sell{background:var(--dn)}
.tm-submit:disabled{background:var(--surface3);color:var(--t3);cursor:not-allowed}

/* ===== CASH CARD (예수금) ===== */
.cash-card{background:linear-gradient(135deg,#2a4a7f 0%,#3d6baa 100%);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.cash-card::after{content:'';position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06)}
.cash-card .cc-label{font-size:11px;color:rgba(255,255,255,.75);margin-bottom:5px;font-weight:600;letter-spacing:.3px}
.cash-card .cc-val{font-size:24px;font-weight:800;letter-spacing:-.6px;margin-bottom:12px;position:relative;z-index:1}
.cash-card .cc-btns{display:flex;gap:7px;position:relative;z-index:1}
.cash-card .cc-btn{flex:1;padding:10px;border:none;border-radius:9px;background:rgba(255,255,255,.18);color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.cash-card .cc-btn:active{background:rgba(255,255,255,.3)}

/* ===== 입출금 빠른 버튼 ===== */
.deposit-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.deposit-btns button{padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--t1);font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.deposit-btns button:active{transform:scale(.97);background:var(--surface2)}
.deposit-btns button.in{border-color:rgba(63,185,80,.4);color:#3fb950}
.deposit-btns button.out{border-color:rgba(168,189,212,.3);color:var(--t2)}

/* ===== 거래내역 페이지 ===== */
.tx-page-tabs{display:flex;gap:6px;padding:10px 20px 12px}
.tx-page-tabs button{padding:8px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .15s}
.tx-page-tabs button.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.tx-page-list{padding:0 20px}
.tx-page-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border-light)}
.tx-page-item:last-child{border-bottom:none}

/* 잔고탭 빠른 액세스 */
.bal-quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bal-quick button{padding:13px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--surface);color:var(--t1);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.bal-quick button:active{transform:scale(.97);background:var(--surface2)}
.bal-quick button svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round}

/* ===== MOCK BADGE ===== */
.mock-badge{display:inline-block;margin-left:7px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:.8px;background:linear-gradient(135deg,#f0a030,#e87b1a);color:#fff;border-radius:6px;vertical-align:middle;box-shadow:0 1px 3px rgba(232,123,26,.35)}

/* ===== 검색바 (Market) ===== */
.mkt-search{display:flex;align-items:center;gap:8px;margin:8px 20px 2px;padding:0 12px;background:var(--surface);border:1px solid var(--border-light);border-radius:22px;height:38px}
.mkt-search:focus-within{border-color:var(--accent)}
.mkt-search .ms-icon{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0}
.mkt-search input{flex:1;border:none;background:transparent;color:var(--t1);font-size:13px;font-family:inherit;outline:none;padding:0}
.mkt-search input::placeholder{color:var(--t3)}
.mkt-search .ms-clear{width:22px;height:22px;border:none;background:var(--surface2);color:var(--t2);border-radius:50%;cursor:pointer;font-size:11px;font-family:inherit;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* ===== Watchlist (관심종목) ===== */
.watch-star{color:#f0a030;font-size:13px;font-weight:700}

/* 종목상세 우측 상단 액션 */
.sd-actions-top{position:absolute;top:8px;right:14px;display:flex;align-items:center;gap:8px;z-index:2}
.sd-watch{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--t3);transition:all .15s;line-height:1}
.sd-watch.on{color:#f0a030;border-color:rgba(240,160,48,.4);background:rgba(240,160,48,.1)}
.sd-watch:active{transform:scale(.9)}
/* 기존 sd-close는 sd-actions-top 안으로 들어가므로 position 무효화 */
.sd-actions-top .sd-close{position:static;top:auto;right:auto}

/* ===== Memo (메모) ===== */
.memo-input{width:100%;border:1px solid var(--border);background:var(--bg);color:var(--t1);border-radius:8px;padding:10px;font-size:12.5px;font-family:inherit;resize:vertical;min-height:60px;line-height:1.5}
.memo-input:focus{outline:none;border-color:var(--accent)}
.memo-input::placeholder{color:var(--t3)}
.memo-save{margin-top:8px;padding:9px 18px;border:none;background:var(--accent);color:#fff;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;float:right}
.memo-save:active{opacity:.85}

/* ===== Seed 옵션 (리셋 모달) ===== */
.seed-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.seed-options button{padding:13px 0;border:1px solid var(--border);background:var(--surface2);color:var(--t2);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.seed-options button:active{transform:scale(.97)}
.seed-options button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* market filter 한 줄 정렬 */
.mf{flex-wrap:wrap;align-items:center}

/* ===== 모달 드래그 핸들 + 트랜지션 ===== */
.modal{position:relative;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.tm-sheet{transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sd-sheet{transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-handle{display:flex;justify-content:center;padding:4px 0 10px;cursor:grab;margin-top:-14px;touch-action:none}
.modal-handle span{width:40px;height:4px;border-radius:2px;background:var(--border);transition:background .15s}
.modal-handle:active span,.tm-handle:active span,.sd-handle:active span{background:var(--t3)}
.tm-handle{display:flex;justify-content:center;padding:0 0 10px;cursor:grab;margin-top:-8px;touch-action:none}
.tm-handle span{width:40px;height:4px;border-radius:2px;background:var(--border);transition:background .15s}
.sd-handle{cursor:grab;touch-action:none}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-logo">영웅문S#</div>
  <div class="splash-sub">안전한 투자의 시작</div>
  <div class="splash-steps">
    <div class="splash-step" id="ss1"><span class="ss-icon">①</span>보안 모듈 초기화</div>
    <div class="splash-step" id="ss2"><span class="ss-icon">②</span>통신 채널 암호화</div>
    <div class="splash-step" id="ss3"><span class="ss-icon">③</span>시세 데이터 수신</div>
    <div class="splash-step" id="ss4"><span class="ss-icon">④</span>포트폴리오 동기화</div>
  </div>
  <div class="splash-bar"><div class="splash-bar-fill" id="splashBar"></div></div>
  <div class="splash-ver">v3.0.0</div>
</div>
<div class="app" id="app"></div>
<script>
let S=[],isLive=false,lastUpdate=null,serverError=false;
let st={tab:'home',hold:[],sel:null,mf:'all',stxt:'',toast:'',tt:null,cash:10000000,watchlist:[],memos:{},seasonStart:Date.now(),initialSeed:10000000};
let chartData=[],chartPeriod='1m',chartLoading=false,lastChartCode=null;
let newsData=[],newsLoading=false,newsFetched=false;
let indicesData=[];

const F=n=>Math.round(n).toLocaleString('ko-KR');
function toast(m){st.toast=m;clearTimeout(st.tt);R();st.tt=setTimeout(()=>{st.toast='';R()},2200)}
function tp(){return st.hold.reduce((a,h)=>a+h.ap*h.q,0)}
function te(){return st.hold.reduce((a,h)=>{let s=S.find(x=>x.code===h.c);return a+(s?s.price:h.ap)*h.q},0)}
function pnl(){return te()-tp()}

/* ===== 모달 swipe-to-close (모바일 드래그 닫기) ===== */
function attachSwipeClose(sheet,closeFn,handle){
  if(!sheet)return;
  const target=handle||sheet;
  let startY=0,currentY=0,dragging=false,fromHandle=!!handle;
  function start(e){
    // 핸들이 아닌 경우(시트 전체)에서는 스크롤 맨 위에서만 드래그
    if(!fromHandle&&sheet.scrollTop>0)return;
    startY=(e.touches?e.touches[0].clientY:e.clientY);
    currentY=startY;dragging=true;
    sheet.style.transition='none';
  }
  function move(e){
    if(!dragging)return;
    currentY=(e.touches?e.touches[0].clientY:e.clientY);
    const dy=currentY-startY;
    if(dy>0){
      sheet.style.transform='translateY('+dy+'px)';
      if(e.cancelable)e.preventDefault();
    }else{
      sheet.style.transform='';
    }
  }
  function end(){
    if(!dragging)return;
    dragging=false;
    sheet.style.transition='';
    const dy=currentY-startY;
    if(dy>110){
      sheet.style.transform='translateY(100%)';
      setTimeout(closeFn,200);
    }else{
      sheet.style.transform='';
    }
  }
  target.addEventListener('touchstart',start,{passive:true});
  target.addEventListener('touchmove',move,{passive:false});
  target.addEventListener('touchend',end);
  target.addEventListener('touchcancel',end);
}

    {code:'005930',name:'삼성전자',type:'buy',price:138000,qty:12,date:now-86400000*45},

async function fetchChart(code,period){
  chartLoading=true;lastChartCode=code;chartPeriod=period;R();
  try{
    const res=await fetch(`/api/chart?symbol=${code}&period=${period}`);
    const json=await res.json();
    if(json.success&&lastChartCode===code)chartData=json.data;
  }catch(e){chartData=[]}
  chartLoading=false;R();setTimeout(drawChart,50);
}

function drawChart(){
  const canvas=document.getElementById('stockChart');
  if(!canvas||chartData.length===0)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:16,r:14,b:28,l:14};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const closes=chartData.map(d=>d.close);
  const minP=Math.min(...closes),maxP=Math.max(...closes);
  const range=maxP-minP||1;
  ctx.clearRect(0,0,W,H);

  const isUp=closes[closes.length-1]>=closes[0];
  const lineColor=isUp?'#ff4d5e':'#3b9eff';

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(61,90,138,.5)';ctx.lineWidth=.5;
  for(let i=0;i<4;i++){
    const y=pad.t+cH*i/3;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  }

  // Fill gradient
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,isUp?'rgba(255,77,94,.18)':'rgba(59,158,255,.18)');
  grad.addColorStop(1,'rgba(26,39,68,0)');
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  // End dot
  const lastX=pad.l+((closes.length-1)/(closes.length-1))*cW;
  const lastY=pad.t+(1-(closes[closes.length-1]-minP)/range)*cH;
  ctx.beginPath();ctx.arc(lastX,lastY,3.5,0,Math.PI*2);ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(lastX,lastY,6,0,Math.PI*2);ctx.fillStyle=isUp?'rgba(255,77,94,.25)':'rgba(59,158,255,.25)';ctx.fill();

  // Price labels
  ctx.fillStyle='#708ab5';ctx.font='500 10px -apple-system,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(F(maxP),W-pad.r,pad.t+4);
  ctx.fillText(F(minP),W-pad.r,H-pad.b-2);

  // Date labels
  ctx.textAlign='center';ctx.fillStyle='#708ab5';
  const first=chartData[0].date.trim(),last=chartData[chartData.length-1].date.trim();
  let f1,f2;
  if(chartPeriod==='day'){
    f1=first.length>=12?first.substring(8,10)+':'+first.substring(10,12):first;
    f2=last.length>=12?last.substring(8,10)+':'+last.substring(10,12):last;
  }else{
    f1=first.substring(4,6)+'.'+first.substring(6,8);
    f2=last.substring(4,6)+'.'+last.substring(6,8);
  }
  ctx.fillText(f1,pad.l+30,H-8);ctx.fillText(f2,W-pad.r-30,H-8);
}

function renderSubAnalysis(){
  const v=pnl(),p=pnlP();
  const totalAsset=te()+st.cash;
  // 누적 수익률 (현재 총자산 vs 시작 자산)
  const cumPnl=totalAsset-st.initialSeed;
  const cumRate=st.initialSeed?(cumPnl/st.initialSeed*100):0;

  const topStock=st.hold.length>0?st.hold.reduce((best,h)=>{
    const s=S.find(x=>x.code===h.c);const cur=s?s.price:h.ap;
    const pl=(cur-h.ap)*h.q;return pl>best.pl?{name:h.n,pl}:best;
  },{name:'-',pl:-Infinity}):null;
  const worstStock=st.hold.length>0?st.hold.reduce((worst,h)=>{
    const s=S.find(x=>x.code===h.c);const cur=s?s.price:h.ap;
    const pl=(cur-h.ap)*h.q;return pl<worst.pl?{name:h.n,pl}:worst;
  },{name:'-',pl:Infinity}):null;

  // 매매 통계
  const buyCnt=transactions.filter(t=>t.type==='buy').length;
  const sellCnt=transactions.filter(t=>t.type==='sell').length;
  // 실현 손익 (매도 시 평단가 근사: 매도가 - 누적 평균 매수가)
  const realizedPnl=transactions.filter(t=>t.type==='sell').reduce((a,t)=>{
    const buys=transactions.filter(b=>b.code===t.code&&b.type==='buy'&&b.date<t.date);
    if(buys.length===0)return a;
    const avgBuy=buys.reduce((s,b)=>s+b.price*b.qty,0)/buys.reduce((s,b)=>s+b.qty,0);
    return a+(t.price-avgBuy)*t.qty;
  },0);
  // 종목 분산
  const concentration=st.hold.length>0?(()=>{
    const totals=st.hold.map(h=>{const s=S.find(x=>x.code===h.c);return(s?s.price:h.ap)*h.q});
    const sum=totals.reduce((a,b)=>a+b,0);
    const max=Math.max(...totals);
    return sum?(max/sum*100):0;
  })():0;

  // 손익 진행 바
  const progressPct=Math.min(100,Math.max(0,(cumRate+50)));

  return `<div class="sub-page">${subBack()}
    <div class="sub-title">투자분석</div>

    <div class="sub-card"><div class="sc-hd">누적 성과</div>
      <div style="padding:16px">
        <div style="font-size:11px;color:var(--t3);margin-bottom:5px">시작 자산 ${F(st.initialSeed)}원 → 현재 총자산</div>
        <div style="font-size:24px;font-weight:800;color:${cumPnl>=0?'var(--up)':'var(--dn)'};letter-spacing:-.5px">${cumPnl>=0?'+':''}${F(Math.round(cumPnl))}원</div>
        <div style="font-size:13px;font-weight:700;color:${cumPnl>=0?'var(--up)':'var(--dn)'};margin-top:2px">${cumPnl>=0?'+':''}${cumRate.toFixed(2)}%</div>
        <div style="margin-top:10px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative">
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--t3)"></div>
          <div style="height:100%;width:${progressPct}%;background:${cumPnl>=0?'linear-gradient(90deg,var(--surface2) 50%,var(--up))':'linear-gradient(90deg,var(--dn),var(--surface2) 50%)'};transition:width .3s"></div>
        </div>
      </div>
      <div class="sub-row"><span class="sr-l">현재 총자산</span><span class="sr-v">${F(totalAsset)}원</span></div>
      <div class="sub-row"><span class="sr-l">예수금</span><span class="sr-v" style="color:#3fb950">${F(st.cash)}원</span></div>
      <div class="sub-row"><span class="sr-l">주식 평가금</span><span class="sr-v">${F(te())}원</span></div>
    </div>

    <div class="sub-card"><div class="sc-hd">보유 종목 손익</div>
      <div class="sub-row"><span class="sr-l">평가 손익 (미실현)</span><span class="sr-v ${v>=0?'up':'dn'}">${v>=0?'+':''}${F(Math.round(v))}원 (${v>=0?'+':''}${p.toFixed(2)}%)</span></div>
      <div class="sub-row"><span class="sr-l">실현 손익 (누적)</span><span class="sr-v ${realizedPnl>=0?'up':'dn'}">${realizedPnl>=0?'+':''}${F(Math.round(realizedPnl))}원</span></div>
      <div class="sub-row"><span class="sr-l">총 투자금액</span><span class="sr-v">${F(tp())}원</span></div>
      <div class="sub-row"><span class="sr-l">최고 수익 종목</span><span class="sr-v up">${topStock&&topStock.pl>-Infinity?topStock.name+' ('+(topStock.pl>=0?'+':'')+F(Math.round(topStock.pl))+'원)':'-'}</span></div>
      <div class="sub-row"><span class="sr-l">최저 수익 종목</span><span class="sr-v dn">${worstStock&&worstStock.pl<Infinity?worstStock.name+' ('+(worstStock.pl>=0?'+':'')+F(Math.round(worstStock.pl))+'원)':'-'}</span></div>
    </div>

    <div class="sub-card"><div class="sc-hd">매매 활동</div>
      <div class="sub-row"><span class="sr-l">총 매수 횟수</span><span class="sr-v">${buyCnt}회</span></div>
      <div class="sub-row"><span class="sr-l">총 매도 횟수</span><span class="sr-v">${sellCnt}회</span></div>
      <div class="sub-row"><span class="sr-l">보유 종목 수</span><span class="sr-v">${st.hold.length}개</span></div>
      <div class="sub-row"><span class="sr-l">관심종목</span><span class="sr-v">${st.watchlist.length}개</span></div>
      <div class="sub-row"><span class="sr-l">최대 종목 비중</span><span class="sr-v" style="color:${concentration>50?'#f0a030':'var(--t1)'}">${concentration.toFixed(1)}%</span></div>
    </div>
  </div>`;
}

  let h=`<div class="sub-page">${subBack()}

  }else{

      .sort((a,b)=>Math.abs(b.changeRate)-Math.abs(a.changeRate));

      const isUp=s.changeRate>=0,isFlat=s.changeRate===0;
      h+=`<div class="si" onclick="goOrder('${s.code}')" style="padding:13px 16px">
        <div class="si-i"><div class="si-n"><span class="watch-star">★</span> ${s.name}</div><div class="si-sub">${s.code} · ${s.market}</div></div>
        <div class="si-r">
          <div class="si-p">${F(s.price)}원</div>
          <div class="si-c ${isFlat?'':(isUp?'up':'dn')}">${isFlat?'0.00%':(isUp?'+':'')+s.changeRate.toFixed(2)+'%'}</div>
        </div>
      </div>`;
    });
    // 시세에 없는 종목 (혹시)
    const missing=st.watchlist.filter(c=>!S.find(x=>x.code===c));
    missing.forEach(c=>{
      h+=`<div class="si" style="padding:13px 16px">
        <div class="si-i"><div class="si-n" style="color:var(--t3)">★ ${c}</div><div class="si-sub">시세 없음</div></div>
        <div class="si-r"><button onclick="event.stopPropagation();toggleWatch('${c}')" style="padding:6px 10px;border:1px solid var(--border);background:var(--surface2);color:var(--t2);border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit">해제</button></div>
      </div>`;
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderSubAI(){
  // 시세 기반 단순 스코어: 등락률 가중치 + 거래량 가중치
  if(S.length===0)return `<div class="sub-page">${subBack()}<div class="sub-title">시장 트렌드</div><div class="empty">시세 로딩 중</div></div>`;
  const maxVol=Math.max(...S.map(s=>s.volume||0))||1;
  const scored=S.map(s=>({
    name:s.name,code:s.code,price:s.price,changeRate:s.changeRate,
    score:Math.min(99,Math.max(20,Math.round(50+s.changeRate*5+(s.volume||0)/maxVol*15)))

  const top=scored.slice(0,8);

    </div>

    <div class="sub-card"><div class="sc-hd">관심도 TOP 8 (등락률·거래량 기반)</div>`;
  top.forEach(s=>{

async function fetchSdChart(code,period){
  sdChartLoading=true;sdChartPeriod=period;
  // 차트영역만 업데이트
  const area=document.getElementById('sdChartArea');
  if(area)area.innerHTML='<div class="cl"><div class="spinner" style="width:18px;height:18px"></div></div>';
  try{
    const res=await fetch(`/api/chart?symbol=${code}&period=${period}`);
    const json=await res.json();
    if(json.success)sdChartData=json.data;else sdChartData=[];
  }catch(e){sdChartData=[]}
  sdChartLoading=false;
  // 차트 다시 그리기
  const area2=document.getElementById('sdChartArea');
  if(area2){
    area2.innerHTML='<canvas id="sdChart"></canvas>';
    // 탭 버튼 상태 업데이트
    const btns=document.querySelectorAll('.sd-ct button');
    btns.forEach(b=>{
      const p=b.textContent==='1일'?'day':b.textContent==='1주'?'1w':b.textContent==='1개월'?'1m':b.textContent==='3개월'?'3m':'1y';
      b.className=p===sdChartPeriod?'on':'';
    });
    setTimeout(drawSdChart,30);
  }
}

function switchSdChart(p){if(sdCode)fetchSdChart(sdCode,p)}

function drawSdChart(){
  const canvas=document.getElementById('sdChart');
  if(!canvas||sdChartData.length===0)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:14,r:12,b:24,l:12};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const closes=sdChartData.map(d=>d.close);
  const minP=Math.min(...closes),maxP=Math.max(...closes);
  const range=maxP-minP||1;
  ctx.clearRect(0,0,W,H);
  const isUp=closes[closes.length-1]>=closes[0];
  const lineColor=isUp?'#ff4d5e':'#3b9eff';
  // Grid
  ctx.strokeStyle='rgba(42,63,110,.4)';ctx.lineWidth=.5;
  for(let i=0;i<4;i++){const y=pad.t+cH*i/3;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke()}
  // Fill
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,isUp?'rgba(255,77,94,.15)':'rgba(59,158,255,.15)');
  grad.addColorStop(1,'rgba(34,52,88,0)');
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){const x=pad.l+(i/(closes.length-1))*cW,y=pad.t+(1-(closes[i]-minP)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){const x=pad.l+(i/(closes.length-1))*cW,y=pad.t+(1-(closes[i]-minP)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.strokeStyle=lineColor;ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  // End dot
  const lx=pad.l+cW,ly=pad.t+(1-(closes[closes.length-1]-minP)/range)*cH;
  ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,5.5,0,Math.PI*2);ctx.fillStyle=isUp?'rgba(255,77,94,.2)':'rgba(59,158,255,.2)';ctx.fill();
  // Labels
  ctx.fillStyle='#708ab5';ctx.font='500 10px -apple-system,sans-serif';ctx.textAlign='right';
  ctx.fillText(F(maxP),W-pad.r,pad.t+4);ctx.fillText(F(minP),W-pad.r,H-pad.b-2);
  ctx.textAlign='center';
  const first=sdChartData[0].date.trim(),last=sdChartData[sdChartData.length-1].date.trim();
  let f1,f2;
  if(sdChartPeriod==='day'){f1=first.length>=12?first.substring(8,10)+':'+first.substring(10,12):first;f2=last.length>=12?last.substring(8,10)+':'+last.substring(10,12):last}
  else{f1=first.substring(4,6)+'.'+first.substring(6,8);f2=last.substring(4,6)+'.'+last.substring(6,8)}
  ctx.fillText(f1,pad.l+30,H-6);ctx.fillText(f2,W-pad.r-30,H-6);
}

function renderTradeModal(){
  const s=S.find(x=>x.code===tradeCode);
  if(!s){closeTradeModal();return}
  const hd=st.hold.find(h=>h.c===tradeCode);
  const isBuy=tradeMode==='buy';
  const price=s.price,chg=s.change||0,chgR=s.changeRate||0;
  const isUp=chgR>=0;
  const maxQty=isBuy?Math.floor(st.cash/price):(hd?hd.q:0);
  const total=price*tradeQty;
  const fee=Math.round(total*0.00015); // 위탁수수료 0.015%
  const tax=isBuy?0:Math.round(total*0.0023); // 매도 시 거래세 0.23%
  const netTotal=isBuy?(total+fee):(total-fee-tax);
  const afterCash=isBuy?(st.cash-total-fee):(st.cash+total-fee-tax);
  const insufficient=isBuy?(total+fee>st.cash):(tradeQty>maxQty);
  const validQty=tradeQty>0&&tradeQty<=maxQty;

  let html=`<div class="tm-overlay" onclick="closeTradeModal()">
    <div class="tm-sheet" onclick="event.stopPropagation()">
      <div class="tm-handle"><span></span></div>
      <div class="tm-head">
        <div class="tm-name-wrap">
          <div class="tm-name">${s.name}</div>
          <div class="tm-code">${s.code} · ${s.market||''}</div>
        </div>
        <div class="tm-mode ${tradeMode}">${isBuy?'매수':'매도'}</div>
      </div>

      <div class="tm-price-box">
        <div class="tm-pb-l">
          <div class="tm-pb-label">현재가</div>
          <div class="tm-pb-val">${F(price)}원</div>
        </div>
        <div class="tm-pb-r ${isUp?'up':'dn'}">${isUp?'▲':'▼'} ${F(Math.abs(chg))}<br>(${isUp?'+':''}${chgR.toFixed(2)}%)</div>
      </div>

      <label class="tm-label">${isBuy?'매수가능':'보유수량'} · ${F(maxQty)}주 (${isBuy?F(st.cash)+'원':'평단 '+(hd?F(hd.ap):0)+'원'})</label>
      <div class="tm-qty-row">
        <button class="tm-qty-btn" onclick="changeTradeQty(-1)">−</button>
        <input class="tm-qty-input" type="number" inputmode="numeric" id="tradeQtyInput" value="${tradeQty}" oninput="setTradeQty(this.value)" min="0" max="${maxQty}">
        <span class="tm-qty-unit">주</span>
        <button class="tm-qty-btn" onclick="changeTradeQty(1)">＋</button>
      </div>
      <div class="tm-quick">
        <button onclick="setTradeQtyPct(10)">10%</button>
        <button onclick="setTradeQtyPct(25)">25%</button>
        <button onclick="setTradeQtyPct(50)">50%</button>
        <button onclick="setTradeQtyPct(100)">최대</button>
      </div>

      <div class="tm-summary">
        <div class="tm-sum-row"><span class="tms-l">주문 단가</span><span class="tms-v">${F(price)}원</span></div>
        <div class="tm-sum-row"><span class="tms-l">주문 수량</span><span class="tms-v">${F(tradeQty)}주</span></div>
        <div class="tm-sum-row"><span class="tms-l">주문 금액</span><span class="tms-v">${F(total)}원</span></div>
        <div class="tm-sum-row"><span class="tms-l">수수료 (0.015%)</span><span class="tms-v">${F(fee)}원</span></div>
        ${!isBuy?`<div class="tm-sum-row"><span class="tms-l">거래세 (0.23%)</span><span class="tms-v">${F(tax)}원</span></div>`:''}
        <div class="tm-sum-row total"><span class="tms-l">${isBuy?'총 결제금액':'실 수령금액'}</span><span class="tms-v ${isBuy?'up':'dn'}">${F(netTotal)}원</span></div>
        <div class="tm-sum-row"><span class="tms-l">거래 후 예수금</span><span class="tms-v">${F(afterCash)}원</span></div>
      </div>

      ${insufficient&&tradeQty>0?`<div class="tm-warn">⚠ ${isBuy?'예수금이 부족합니다':'보유수량을 초과했습니다'}</div>`:''}

      <button class="tm-submit ${tradeMode}" ${(!validQty||insufficient)?'disabled':''} onclick="submitTrade()">${isBuy?'매수':'매도'} 주문</button>
    </div>
  </div>`;

  let d=document.getElementById('tradeModal');
  if(!d){d=document.createElement('div');d.id='tradeModal';document.body.appendChild(d)}
  d.innerHTML=html;
  setTimeout(()=>{
    const sheet=d.querySelector('.tm-sheet');
    const handle=d.querySelector('.tm-handle');
    attachSwipeClose(sheet,closeTradeModal,handle);
  },20);
}

function setTradeQty(v){
  const s=S.find(x=>x.code===tradeCode);if(!s)return;
  const hd=st.hold.find(h=>h.c===tradeCode);
  const maxQty=tradeMode==='buy'?Math.floor(st.cash/s.price):(hd?hd.q:0);
  let q=parseInt(v)||0;if(q<0)q=0;if(q>maxQty)q=maxQty;
  tradeQty=q;renderTradeModal();
}

function changeTradeQty(delta){
  setTradeQty(tradeQty+delta);
}

function setTradeQtyPct(pct){
  const s=S.find(x=>x.code===tradeCode);if(!s)return;
  const hd=st.hold.find(h=>h.c===tradeCode);
  const maxQty=tradeMode==='buy'?Math.floor(st.cash/s.price):(hd?hd.q:0);
  setTradeQty(Math.floor(maxQty*pct/100));
}

function submitTrade(){
  const s=S.find(x=>x.code===tradeCode);if(!s){toast('종목 정보 오류');return}
  const isBuy=tradeMode==='buy';
  const price=s.price,qty=tradeQty,total=price*qty;
  if(qty<=0){toast('수량을 입력해주세요');return}
  const fee=Math.round(total*0.00015);
  const tax=isBuy?0:Math.round(total*0.0023);

  if(isBuy){
    if(total+fee>st.cash){toast('예수금이 부족합니다');return}
    // cash 차감
    st.cash-=(total+fee);
    // 보유 종목 업데이트 (평단 가중평균)
    const hd=st.hold.find(h=>h.c===tradeCode);
    if(hd){
      const newAvg=Math.round((hd.ap*hd.q+price*qty)/(hd.q+qty));
      hd.ap=newAvg;hd.q+=qty;
    }else{
      st.hold.push({c:s.code,n:s.name,ap:price,q:qty});
    }
  }else{
    const hd=st.hold.find(h=>h.c===tradeCode);
    if(!hd||hd.q<qty){toast('보유 수량이 부족합니다');return}
    // cash 증가
    st.cash+=(total-fee-tax);
    hd.q-=qty;
    if(hd.q<=0){
      st.hold=st.hold.filter(h=>h.c!==tradeCode);
    }
  }

  // 거래내역 기록
  transactions.push({code:s.code,name:s.name,type:isBuy?'buy':'sell',price,qty,date:Date.now()});

  saveHoldings();saveCash();saveTx();
  closeTradeModal();
  // 상세 모달 갱신
  if(sdOpen&&sdCode===s.code){
    closeStockDetail();
    setTimeout(()=>openStockDetail(s.code),60);
  }
  toast(`${s.name} ${qty}주 ${isBuy?'매수':'매도'} 완료`);
}

/* ===== DEPOSIT MODAL (잔고충전 / 출금) ===== */
let depositModalOpen=false,depositMode='in',depositAmt=0;

function openDepositModal(mode){

}

function renderDepositModal(){
  const isIn=depositMode==='in';
  const maxOut=st.cash;
  const insufficient=!isIn&&depositAmt>maxOut;
  const valid=depositAmt>0&&!insufficient;
  const afterCash=isIn?(st.cash+depositAmt):(st.cash-depositAmt);

  let html=`<div class="modal-bg" onclick="closeDepositModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"><span></span></div>
      <div class="tm-head" style="margin-bottom:14px">
        <div class="tm-name-wrap">
          <div class="tm-name">${isIn?'예수금 충전':'예수금 출금'}</div>
          <div class="tm-code">${isIn?'시드머니 추가':'예수금 빼기'}</div>

        <div class="tm-mode ${isIn?'buy':'sell'}">${isIn?'입금':'출금'}</div>
      </div>

      <div class="tm-price-box">
        <div class="tm-pb-l">
          <div class="tm-pb-label">현재 예수금</div>
          <div class="tm-pb-val">${F(st.cash)}원</div>
        </div>
      </div>

      <label class="tm-label">금액 입력</label>
      <div class="tm-qty-row">
        <input class="tm-qty-input" type="number" inputmode="numeric" id="depAmtInput" value="${depositAmt}" oninput="setDepositAmt(this.value)" min="0" placeholder="0">
        <span class="tm-qty-unit">원</span>
      </div>
      <div class="tm-quick">
        <button onclick="addDepositAmt(100000)">+10만</button>
        <button onclick="addDepositAmt(1000000)">+100만</button>
        <button onclick="addDepositAmt(5000000)">+500만</button>
        <button onclick="addDepositAmt(10000000)">+1천만</button>
      </div>

      <div class="tm-summary">
        <div class="tm-sum-row"><span class="tms-l">${isIn?'입금':'출금'} 금액</span><span class="tms-v">${F(depositAmt)}원</span></div>
        <div class="tm-sum-row"><span class="tms-l">출금 계좌</span><span class="tms-v" style="font-size:11.5px">신한은행 110-***-****78</span></div>
        <div class="tm-sum-row total"><span class="tms-l">${isIn?'충전 후':'출금 후'} 예수금</span><span class="tms-v">${F(afterCash)}원</span></div>
      </div>

      ${insufficient?`<div class="tm-warn">⚠ 출금 가능 금액을 초과했습니다</div>`:''}

      <div class="m-btns" style="margin-top:0">
        <button class="m-cancel" onclick="closeDepositModal()">취소</button>
        <button class="m-ok" style="background:${isIn?'#3fb950':'var(--accent)'}" ${!valid?'disabled':''} onclick="submitDeposit()">${isIn?'충전하기':'출금하기'}</button>
      </div>
    </div>
  </div>`;

  let d=document.getElementById('depositModal');
  if(!d){d=document.createElement('div');d.id='depositModal';document.body.appendChild(d)}
  d.innerHTML=html;
  setTimeout(()=>{
    const sheet=d.querySelector('.modal');
    const handle=d.querySelector('.modal-handle');
    attachSwipeClose(sheet,closeDepositModal,handle);
  },20);
}

function setDepositAmt(v){
  let n=parseInt(v)||0;if(n<0)n=0;
  depositAmt=n;renderDepositModal();
}

function addDepositAmt(n){
  setDepositAmt(depositAmt+n);
}

function submitDeposit(){
  const isIn=depositMode==='in';
  if(depositAmt<=0){toast('금액을 입력해주세요');return}
  if(!isIn&&depositAmt>st.cash){toast('출금 가능 금액을 초과했습니다');return}
  if(isIn){
    st.cash+=depositAmt;
    transactions.push({code:'CASH',name:'계좌 입금',type:'deposit',price:1,qty:depositAmt,date:Date.now()});
  }else{
    st.cash-=depositAmt;
    transactions.push({code:'CASH',name:'계좌 출금',type:'withdraw',price:1,qty:depositAmt,date:Date.now()});
  }
  saveCash();saveTx();
  closeDepositModal();
  toast(`${F(depositAmt)}원 ${isIn?'충전':'출금'} 완료`);
  R();
}

/* ===== 서비스 워커 해제 + 캐시 삭제 ===== */
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });

    caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
  }

/* ===== MARKET HOURS ===== */
function getMarketStatus(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),day=now.getDay();
  if(day===0||day===6)return{open:false,text:'주말 휴장'};
  if(h<9||(h===9&&m===0))return{open:false,text:'장 개장 전 (09:00~)'};
  if(h>=9&&h<15||(h===15&&m<=30))return{open:true,text:'정규장 운영중'};
  if(h>=15&&h<18)return{open:false,text:'시간외 종가매매'};
  return{open:false,text:'장 마감'};
}

/* ===== SPLASH SCREEN ===== */
function runSplash(){
  const steps=['ss1','ss2','ss3','ss4'];
  const bar=document.getElementById('splashBar');
  let i=0;
  function next(){
    if(i>0)document.getElementById(steps[i-1]).className='splash-step done';
    if(i<steps.length){
      document.getElementById(steps[i]).className='splash-step active';
      bar.style.width=((i+1)/steps.length*100)+'%';
      i++;
      setTimeout(next,400+Math.random()*300);
    }else{
      bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('splash').classList.add('hide');
        setTimeout(()=>document.getElementById('splash').remove(),500);
      },300);
    }
  }
  next();
}
