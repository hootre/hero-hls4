<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>영웅문S#</title>
<link rel="icon" href="/logo.png" type="image/png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;background:#0d1117;color:#e6edf3}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --surface3:#21283b;
  --border:#30363d;
  --border-light:#21262d;
  --t1:#e6edf3;
  --t2:#8b949e;
  --t3:#484f58;
  --up:#ff4757;--up-soft:rgba(255,71,87,.12);--up-glow:rgba(255,71,87,.25);
  --dn:#1e90ff;--dn-soft:rgba(30,144,255,.12);--dn-glow:rgba(30,144,255,.25);
  --accent:#58a6ff;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.app{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== HEADER ===== */
.hdr{
  padding:env(safe-area-inset-top,0) 0 0;
  padding-left:20px;padding-right:20px;
  padding-top:max(env(safe-area-inset-top,0px),12px);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg);z-index:20;position:relative;
  height:56px;flex-shrink:0;
}
.hdr .logo{display:flex;align-items:center;gap:10px}
.hdr .logo img{height:28px;object-fit:contain;filter:brightness(1.1)}
.hdr .logo-text{font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.hdr-r{display:flex;gap:6px}
.hdr-r .ib{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.hdr-r .ib:active{transform:scale(.9);background:var(--surface2)}
.hdr-r .ib svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== TOP TABS ===== */
.tabs{display:flex;padding:4px 20px 0;gap:4px;background:var(--bg);z-index:10;flex-shrink:0}
.tabs button{
  padding:9px 16px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .2s;white-space:nowrap;
}
.tabs button.on{background:#e6edf3;color:#0d1117;box-shadow:0 2px 8px rgba(230,237,243,.15)}
.tabs button:not(.on){background:transparent;color:var(--t2)}
.tabs button:not(.on):active{background:var(--surface)}

/* ===== STATUS ===== */
.status{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px;font-size:11px;color:var(--t3);flex-shrink:0}
.status .lv{display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== CONTENT ===== */
.cnt{flex:1;overflow-y:auto;padding-bottom:88px;-webkit-overflow-scrolling:touch}

/* ===== HOME - Portfolio ===== */
.porto{padding:20px 20px 8px}
.porto .p-label{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:8px}
.porto .p-amt{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1.15;color:var(--t1)}
.porto .p-chg{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.porto .p-chg.up{color:var(--up);background:var(--up-soft)}
.porto .p-chg.dn{color:var(--dn);background:var(--dn-soft)}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 20px}
.g4{background:var(--surface);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border-light)}
.g4 .g4l{font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.g4 .g4v{font-size:16px;font-weight:700;letter-spacing:-.3px}
.g4 .g4v.up{color:var(--up)}.g4 .g4v.dn{color:var(--dn)}

.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 12px}
.sec-hd .sh-t{font-size:15px;font-weight:700}
.sec-hd .sh-cnt{font-size:12px;color:var(--t3);background:var(--surface);padding:3px 10px;border-radius:12px;font-weight:600}

/* Stock item (shared) */
.si{display:flex;align-items:center;padding:14px 20px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border-light)}
.si:last-child{border-bottom:none}
.si:active{background:var(--surface)}
.si .si-i{flex:1;min-width:0}
.si .si-n{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);letter-spacing:-.3px}
.si .si-sub{font-size:12px;color:var(--t3);margin-top:3px;font-weight:400}
.si .si-r{text-align:right;flex-shrink:0;padding-left:16px}
.si .si-p{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.si .si-c{font-size:12px;margin-top:3px;font-weight:600}
.si .si-c.up{color:var(--up)}.si .si-c.dn{color:var(--dn)}

/* ===== MARKET ===== */
.mf{display:flex;gap:6px;padding:12px 20px 8px}
.mf button{padding:8px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .2s}
.mf button:active{opacity:.7}
.mf button.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}

/* ===== ORDER ===== */
.ov{padding:16px 20px}

/* Search */
.sw{position:relative;margin-bottom:14px}
.sw input{
  width:100%;padding:14px 16px 14px 44px;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  font-size:15px;background:var(--surface);font-family:inherit;
  color:var(--t1);transition:all .2s;
}
.sw input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,.12)}
.sw input::placeholder{color:var(--t3)}
.sw .sw-i{position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex}
.sw .sw-i svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Search results */
.srl{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);max-height:240px;overflow-y:auto;margin-bottom:14px}
.sri{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border-light);transition:background .1s}
.sri:last-child{border-bottom:none}
.sri:active{background:var(--surface2)}
.sri .sr-n{font-weight:600;font-size:14px;color:var(--t1)}
.sri .sr-c{font-size:11px;color:var(--t3);margin-top:2px}
.sri .sr-p{font-weight:700;font-size:14px}

/* Selected stock card */
.ss{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:12px}
.ss .ss-top{display:flex;align-items:baseline;gap:8px}
.ss .ss-n{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.4px}
.ss .ss-c{font-size:12px;color:var(--t3)}
.ss .ss-p{font-size:28px;font-weight:800;margin-top:12px;letter-spacing:-.8px}
.ss .ss-d{font-size:13px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px}
.ss .ss-d.up{color:var(--up);background:var(--up-soft)}
.ss .ss-d.dn{color:var(--dn);background:var(--dn-soft)}

/* Chart */
.cw{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.ct{display:flex;padding:2px 4px;border-bottom:1px solid var(--border-light)}
.ct button{flex:1;padding:10px 0;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .15s;position:relative;border-radius:var(--radius-xs)}
.ct button:active{background:var(--surface2)}
.ct button.on{color:var(--accent)}
.ct button.on::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:1px}
.ca{padding:16px;height:200px;position:relative}
.ca canvas{width:100%;height:100%}
.cl{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:13px;gap:8px}
.ci{display:flex;justify-content:space-between;padding:0 16px 14px;font-size:11px;color:var(--t3);font-weight:500}

/* Buy/Sell toggle */
.bst{display:flex;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;gap:0;border:1px solid var(--border)}
.bst button{flex:1;padding:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.bst button:active{opacity:.85}
.bst .bb{background:var(--surface);color:var(--t3)}.bst .bb.on{background:var(--up);color:#fff;box-shadow:0 2px 12px var(--up-glow)}
.bst .bs{background:var(--surface);color:var(--t3)}.bst .bs.on{background:var(--dn);color:#fff;box-shadow:0 2px 12px var(--dn-glow)}

/* Price type toggle */
.pt{display:flex;border-radius:var(--radius-xs);overflow:hidden;margin-bottom:12px;background:var(--surface);padding:3px;border:1px solid var(--border-light)}
.pt button{flex:1;padding:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t3);transition:all .2s;border-radius:6px}
.pt button.on{background:var(--surface3);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Order form */
.of{display:flex;flex-direction:column;gap:10px}
.or{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
.or label{font-size:13px;color:var(--t3);font-weight:500;flex-shrink:0}
.or input{border:none;font-size:16px;text-align:right;font-weight:700;width:140px;background:transparent;font-family:inherit;color:var(--t1)}
.or input:focus{outline:none}
.or .oh{font-size:11px;color:var(--t3);margin-top:4px;text-align:right}
.ot{display:flex;justify-content:space-between;padding:16px 4px 8px;font-size:16px;font-weight:700}
.ot span:first-child{color:var(--t2)}
.ob{padding:16px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;transition:all .15s;margin-top:4px;letter-spacing:-.2px}
.ob:active{transform:scale(.98);opacity:.9}

/* ===== SETTINGS ===== */
.stv{padding:20px}
.sc{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.sc .sh{padding:16px 20px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border-light);color:var(--t2);display:flex;align-items:center;gap:8px}
.sc .sh::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border-light)}
.sr:last-child{border-bottom:none}
.sr label{font-size:13px;color:var(--t3)}
.sr .srv{font-size:14px;font-weight:700;color:var(--t1)}
.rb{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--up-soft);color:var(--up);transition:all .2s;margin-bottom:8px}
.rb:active{opacity:.7}
.sn{font-size:12px;color:var(--t3);line-height:1.6;padding:0 4px}

/* ===== BOTTOM NAV ===== */
.bn{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;display:flex;
  background:rgba(13,17,23,.92);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border-light);
  padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100;
}
.bn button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:6px 0;transition:all .15s}
.bn button:active{transform:scale(.9)}
.bn button svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.bn button .bl{font-size:10px;color:var(--t3);font-weight:500;transition:all .2s}
.bn button.on svg{stroke:var(--t1);stroke-width:2}
.bn button.on .bl{color:var(--t1);font-weight:700}

/* ===== COMMON ===== */
.empty{text-align:center;padding:56px 20px;color:var(--t3);font-size:14px;line-height:1.8}
.empty .ei{font-size:40px;margin-bottom:16px;opacity:.5}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);color:var(--t1);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;color:var(--t3);gap:16px;font-size:13px;font-weight:500}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err-page{padding:60px 24px;text-align:center}
.err-page .err-icon{font-size:40px;margin-bottom:20px;opacity:.5}
.err-page .err-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.err-page .err-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:28px}
.err-page .retry-btn{padding:13px 40px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.err-page .retry-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading"><div class="spinner"></div><div>시세 불러오는 중...</div></div>
</div>
<script>
let S=[],isLive=false,lastUpdate=null,serverError=false;
let st={tab:'home',hold:[],ot:'buy',sel:null,mf:'all',stxt:'',oq:0,op:0,pm:'market',toast:'',tt:null};
let chartData=[],chartPeriod='1m',chartLoading=false,lastChartCode=null;

const F=n=>Math.round(n).toLocaleString('ko-KR');
function toast(m){st.toast=m;clearTimeout(st.tt);R();st.tt=setTimeout(()=>{st.toast='';R()},2200)}
function tp(){return st.hold.reduce((a,h)=>a+h.ap*h.q,0)}
function te(){return st.hold.reduce((a,h)=>{let s=S.find(x=>x.code===h.c);return a+(s?s.price:h.ap)*h.q},0)}
function pnl(){return te()-tp()}
function pnlP(){let p=tp();return p?((te()-p)/p*100):0}

function loadHoldings(){try{const s=localStorage.getItem('hls4_holdings');if(s)st.hold=JSON.parse(s)}catch(e){}}
function saveHoldings(){try{localStorage.setItem('hls4_holdings',JSON.stringify(st.hold))}catch(e){}}

const IC={
home:`<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
market:`<svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
order:`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>`,
more:`<svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>`,
bell:`<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
user:`<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
};

async function fetchPrices(){
  try{
    const res=await fetch('/api/prices');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.success){S=json.data;isLive=true;serverError=false;lastUpdate=new Date();R()}
  }catch(e){console.error('시세 조회 실패:',e.message);isLive=false;serverError=true;R()}
}

function timeAgo(){
  if(!lastUpdate)return '';
  const sec=Math.floor((Date.now()-lastUpdate.getTime())/1000);
  if(sec<5)return '방금';if(sec<60)return sec+'초 전';return Math.floor(sec/60)+'분 전';
}

async function fetchChart(code,period){
  chartLoading=true;lastChartCode=code;chartPeriod=period;R();
  try{
    const res=await fetch(`/api/chart?symbol=${code}&period=${period}`);
    const json=await res.json();
    if(json.success&&lastChartCode===code)chartData=json.data;
  }catch(e){chartData=[]}
  chartLoading=false;R();setTimeout(drawChart,50);
}

function drawChart(){
  const canvas=document.getElementById('stockChart');
  if(!canvas||chartData.length===0)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:16,r:14,b:28,l:14};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const closes=chartData.map(d=>d.close);
  const minP=Math.min(...closes),maxP=Math.max(...closes);
  const range=maxP-minP||1;
  ctx.clearRect(0,0,W,H);

  const isUp=closes[closes.length-1]>=closes[0];
  const lineColor=isUp?'#ff4757':'#1e90ff';

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(48,54,61,.4)';ctx.lineWidth=.5;
  for(let i=0;i<4;i++){
    const y=pad.t+cH*i/3;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  }

  // Fill gradient
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,isUp?'rgba(255,71,87,.15)':'rgba(30,144,255,.15)');
  grad.addColorStop(1,'rgba(13,17,23,0)');
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  // End dot
  const lastX=pad.l+((closes.length-1)/(closes.length-1))*cW;
  const lastY=pad.t+(1-(closes[closes.length-1]-minP)/range)*cH;
  ctx.beginPath();ctx.arc(lastX,lastY,3.5,0,Math.PI*2);ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(lastX,lastY,6,0,Math.PI*2);ctx.fillStyle=isUp?'rgba(255,71,87,.2)':'rgba(30,144,255,.2)';ctx.fill();

  // Price labels
  ctx.fillStyle='#484f58';ctx.font='500 10px -apple-system,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(F(maxP),W-pad.r,pad.t+4);
  ctx.fillText(F(minP),W-pad.r,H-pad.b-2);

  // Date labels
  ctx.textAlign='center';ctx.fillStyle='#484f58';
  const first=chartData[0].date.trim(),last=chartData[chartData.length-1].date.trim();
  let f1,f2;
  if(chartPeriod==='day'){
    f1=first.length>=12?first.substring(8,10)+':'+first.substring(10,12):first;
    f2=last.length>=12?last.substring(8,10)+':'+last.substring(10,12):last;
  }else{
    f1=first.substring(4,6)+'.'+first.substring(6,8);
    f2=last.substring(4,6)+'.'+last.substring(6,8);
  }
  ctx.fillText(f1,pad.l+30,H-8);ctx.fillText(f2,W-pad.r-30,H-8);
}

function switchChart(p){if(st.sel)fetchChart(st.sel,p)}

/* ===== RENDER ===== */
function R(){
  const a=document.getElementById('app');
  if(S.length===0&&!serverError)return;
  if(S.length===0&&serverError){
    a.innerHTML=`<div class="err-page"><div class="err-icon">⚠</div><div class="err-title">시세를 불러올 수 없습니다</div><div class="err-desc">네트워크 연결을 확인하고<br>다시 시도해주세요</div><button class="retry-btn" onclick="fetchPrices()">다시 시도</button></div>`;
    return;
  }
  let h='';

  // Header
  h+=`<div class="hdr">
    <div class="logo"><img src="/logo.png" alt="영웅문S#" onerror="this.style.display='none'"><span class="logo-text">영웅문S#</span></div>
    <div class="hdr-r">
      <div class="ib" onclick="toast('알림이 없습니다')">${IC.bell}</div>
      <div class="ib" onclick="T('settings')">${IC.user}</div>
    </div>
  </div>`;

  // Tabs
  h+=`<div class="tabs">
    <button class="${st.tab==='home'?'on':''}" onclick="T('home')">내 자산</button>
    <button class="${st.tab==='order'?'on':''}" onclick="T('order')">매매</button>
    <button class="${st.tab==='market'?'on':''}" onclick="T('market')">종목</button>
  </div>`;

  // Status
  h+=`<div class="status"><div class="lv"><span class="dot" style="background:${isLive?'#3fb950':'#ff4757'}"></span>${isLive?'실시간':'연결 끊김'}</div><div>${timeAgo()}</div></div>`;

  // Content
  h+='<div class="cnt">';
  if(st.tab==='home')h+=renderHome();
  else if(st.tab==='order')h+=renderOrder();
  else if(st.tab==='market')h+=renderMarket();
  else if(st.tab==='settings')h+=renderSettings();
  h+='</div>';

  // Toast
  h+=`<div class="toast ${st.toast?'show':''}">${st.toast}</div>`;

  // Bottom nav
  h+=`<div class="bn">
    <button class="${st.tab==='home'?'on':''}" onclick="T('home')">${IC.home}<span class="bl">홈</span></button>
    <button class="${st.tab==='market'?'on':''}" onclick="T('market')">${IC.market}<span class="bl">종목</span></button>
    <button class="${st.tab==='order'?'on':''}" onclick="T('order')">${IC.order}<span class="bl">매매</span></button>
    <button class="${st.tab==='settings'?'on':''}" onclick="T('settings')">${IC.more}<span class="bl">더보기</span></button>
  </div>`;

  a.innerHTML=h;
  if(st.tab==='order'&&st.sel&&chartData.length>0&&!chartLoading)setTimeout(drawChart,30);
}

/* ===== HOME ===== */
function renderHome(){
  let v=pnl(),p=pnlP(),h='';
  const hasHold=st.hold.length>0;

  h+=`<div class="porto">
    <div class="p-label">총 평가자산</div>
    <div class="p-amt">${F(te())}원</div>`;
  if(hasHold){
    h+=`<div class="p-chg ${v>=0?'up':'dn'}">${v>=0?'▲':'▼'} ${F(Math.abs(Math.round(v)))}원 (${v>=0?'+':''}${p.toFixed(2)}%)</div>`;
  }
  h+=`</div>`;

  h+=`<div class="grid4">
    <div class="g4"><div class="g4l">투자금액</div><div class="g4v">${F(tp())}원</div></div>
    <div class="g4"><div class="g4l">평가금액</div><div class="g4v">${F(te())}원</div></div>
    <div class="g4"><div class="g4l">평가손익</div><div class="g4v ${v>=0?'up':'dn'}">${v>=0?'+':''}${F(Math.round(v))}원</div></div>
    <div class="g4"><div class="g4l">수익률</div><div class="g4v ${v>=0?'up':'dn'}">${v>=0?'+':''}${p.toFixed(2)}%</div></div>
  </div>`;

  h+=`<div class="sec-hd"><span class="sh-t">보유 종목</span><span class="sh-cnt">${st.hold.length}개</span></div>`;

  if(!hasHold){
    h+='<div class="empty"><div class="ei">📊</div>보유 종목이 없습니다<br><span style="font-size:12px">매매 탭에서 첫 거래를 시작해보세요</span></div>';
  }else{
    st.hold.forEach(hd=>{
      let s=S.find(x=>x.code===hd.c),cur=s?s.price:hd.ap;
      let pl=(cur-hd.ap)*hd.q,pc=(cur-hd.ap)/hd.ap*100,isUp=pl>=0;
      h+=`<div class="si" onclick="goOrder('${hd.c}')">
        <div class="si-i"><div class="si-n">${hd.n}</div><div class="si-sub">${hd.q}주 · 평균 ${F(hd.ap)}원</div></div>
        <div class="si-r"><div class="si-p">${F(cur*hd.q)}원</div><div class="si-c ${isUp?'up':'dn'}">${isUp?'+':''}${F(Math.round(pl))}원 (${isUp?'+':''}${pc.toFixed(1)}%)</div></div>
      </div>`;
    });
  }
  return h;
}

/* ===== MARKET ===== */
function renderMarket(){
  let h='';
  h+=`<div class="mf">
    <button class="${st.mf==='all'?'on':''}" onclick="st.mf='all';R()">전체</button>
    <button class="${st.mf==='KOSPI'?'on':''}" onclick="st.mf='KOSPI';R()">코스피</button>
    <button class="${st.mf==='KOSDAQ'?'on':''}" onclick="st.mf='KOSDAQ';R()">코스닥</button>
  </div>`;
  let fl=st.mf==='all'?S:S.filter(s=>s.market===st.mf);
  fl.forEach(s=>{
    let isUp=s.changeRate>=0,isFlat=s.changeRate===0;
    h+=`<div class="si" onclick="goOrder('${s.code}')">
      <div class="si-i"><div class="si-n">${s.name}</div><div class="si-sub">${s.code} · ${s.market}</div></div>
      <div class="si-r"><div class="si-p">${F(s.price)}원</div><div class="si-c ${isFlat?'':(isUp?'up':'dn')}">${isFlat?'0.00%':(isUp?'+':'')+s.changeRate.toFixed(2)+'%'}</div></div>
    </div>`;
  });
  return h;
}

/* ===== ORDER ===== */
function renderOrder(){
  let h='<div class="ov">';
  h+=`<div class="sw"><span class="sw-i">${IC.search}</span><input type="text" placeholder="종목명 또는 코드 검색" value="${st.stxt}" oninput="st.stxt=this.value;R()"></div>`;

  if(st.stxt.length>0){
    let fl=S.filter(s=>s.name.includes(st.stxt)||s.code.includes(st.stxt));
    if(fl.length>0){
      h+='<div class="srl">';
      fl.forEach(s=>{let isUp=s.changeRate>=0;
        h+=`<div class="sri" onclick="selS('${s.code}')"><div><div class="sr-n">${s.name}</div><div class="sr-c">${s.code} · ${s.market}</div></div><div class="sr-p" style="color:${isUp?'var(--up)':'var(--dn)'}">${F(s.price)}</div></div>`;
      });
      h+='</div>';
    }
  }

  if(st.sel){
    let s=S.find(x=>x.code===st.sel);
    if(s){
      let hd=st.hold.find(x=>x.c===st.sel),mxS=hd?hd.q:0;
      let isUp=s.changeRate>=0;

      h+=`<div class="ss">
        <div class="ss-top"><span class="ss-n">${s.name}</span><span class="ss-c">${s.code}</span></div>
        <div class="ss-p" style="color:${isUp?'var(--up)':'var(--dn)'}">${F(s.price)}원</div>
        <div class="ss-d ${isUp?'up':'dn'}">${isUp?'▲':'▼'} ${F(Math.abs(s.change))}원 (${isUp?'+':''}${s.changeRate.toFixed(2)}%)</div>
      </div>`;

      // Chart
      h+=`<div class="cw"><div class="ct">
        <button class="${chartPeriod==='day'?'on':''}" onclick="switchChart('day')">당일</button>
        <button class="${chartPeriod==='1w'?'on':''}" onclick="switchChart('1w')">1주</button>
        <button class="${chartPeriod==='1m'?'on':''}" onclick="switchChart('1m')">1개월</button>
        <button class="${chartPeriod==='3m'?'on':''}" onclick="switchChart('3m')">3개월</button>
        <button class="${chartPeriod==='1y'?'on':''}" onclick="switchChart('1y')">1년</button></div>
        <div class="ca">${chartLoading?'<div class="cl"><div class="spinner" style="width:18px;height:18px"></div>로딩 중</div>':(chartData.length>0?'<canvas id="stockChart"></canvas>':'<div class="cl">차트 데이터 없음</div>')}</div>
        ${chartData.length>0&&!chartLoading?`<div class="ci"><span>고가 ${F(Math.max(...chartData.map(d=>d.high)))}</span><span>저가 ${F(Math.min(...chartData.map(d=>d.low)))}</span></div>`:''}</div>`;

      // Buy/Sell toggle
      h+=`<div class="bst"><button class="bb ${st.ot==='buy'?'on':''}" onclick="st.ot='buy';R()">매수</button><button class="bs ${st.ot==='sell'?'on':''}" onclick="st.ot='sell';R()">매도</button></div>`;

      // Order form
      let orderPrice=st.pm==='market'?s.price:(st.op||s.price);
      h+=`<div class="of"><div class="pt"><button class="${st.pm==='market'?'on':''}" onclick="st.pm='market';R()">시장가</button><button class="${st.pm==='limit'?'on':''}" onclick="st.pm='limit';R()">지정가</button></div>`;

      if(st.pm==='limit'){
        h+=`<div class="or"><label>가격</label><div><input type="number" value="${st.op||s.price}" onchange="st.op=parseInt(this.value)||0;R()" step="100"><div class="oh">현재가 ${F(s.price)}원</div></div></div>`;
      }else{
        h+=`<div class="or"><label>가격</label><div style="text-align:right"><span style="font-size:16px;font-weight:700;color:var(--t1)">${F(s.price)}원</span><div class="oh">현재 시장가 적용</div></div></div>`;
      }

      h+=`<div class="or"><label>수량</label><div><input type="number" value="${st.oq}" onchange="st.oq=parseInt(this.value)||0;R()" min="0" placeholder="0">${st.ot==='sell'&&mxS>0?`<div class="oh">보유 ${F(mxS)}주</div>`:''}</div></div>`;
      h+=`<div class="ot"><span>주문 총액</span><span style="color:var(--t1)">${F(orderPrice*st.oq)}원</span></div>`;
      h+=`<button class="ob" style="background:${st.ot==='buy'?'var(--up)':'var(--dn)'};box-shadow:0 4px 16px ${st.ot==='buy'?'var(--up-glow)':'var(--dn-glow)'}" onclick="exec()">${st.ot==='buy'?'매수':'매도'} 주문</button></div>`;
    }
  }else{
    h+='<div class="empty"><div class="ei">🔍</div>종목을 검색해 선택해주세요</div>';
  }
  h+='</div>';return h;
}

/* ===== SETTINGS ===== */
function renderSettings(){
  let v=pnl(),p=pnlP();
  return `<div class="stv">
    <div class="sc"><div class="sh">보유 현황</div>
    <div class="sr"><label>총 자산 (평가)</label><span class="srv">${F(te())}원</span></div>
    <div class="sr"><label>총 투자금액</label><span class="srv">${F(tp())}원</span></div>
    <div class="sr"><label>평가손익</label><span class="srv" style="color:${v>=0?'var(--up)':'var(--dn)'}">${v>=0?'+':''}${F(Math.round(v))}원</span></div>
    <div class="sr"><label>수익률</label><span class="srv" style="color:${v>=0?'var(--up)':'var(--dn)'}">${v>=0?'+':''}${p.toFixed(2)}%</span></div>
    <div class="sr"><label>보유 종목</label><span class="srv">${st.hold.length}개</span></div></div>
    <button class="rb" onclick="resetA()">전체 초기화</button>
    <div class="sn">모든 보유 종목이 삭제됩니다.</div></div>`;
}

/* ===== ACTIONS ===== */
function T(t){st.tab=t;R()}
function selS(c){let s=S.find(x=>x.code===c);st.sel=c;st.op=s?s.price:0;st.oq=0;st.stxt='';st.pm='market';chartData=[];chartPeriod='1m';R();fetchChart(c,'1m')}
function goOrder(c){st.tab='order';selS(c)}
function resetA(){st.hold=[];st.sel=null;st.oq=0;st.op=0;saveHoldings();toast('초기화 완료')}

function exec(){
  if(!st.sel||st.oq<=0){toast('수량을 입력해주세요');return}
  let s=S.find(x=>x.code===st.sel),pr=st.pm==='market'?s.price:(st.op||s.price),q=st.oq;
  if(st.ot==='buy'){
    let hd=st.hold.find(x=>x.c===s.code);
    if(hd){hd.ap=Math.round((hd.ap*hd.q+pr*q)/(hd.q+q));hd.q+=q}
    else st.hold.push({c:s.code,n:s.name,ap:pr,q:q});
    toast(`${s.name} ${q}주 매수 완료`);
  }else{
    let hd=st.hold.find(x=>x.c===s.code);
    if(!hd||hd.q<q){toast('보유수량 부족');return}
    hd.q-=q;if(hd.q===0)st.hold=st.hold.filter(x=>x.c!==s.code);
    toast(`${s.name} ${q}주 매도 완료`);
  }
  st.oq=0;saveHoldings();R();
}

/* ===== INIT ===== */
loadHoldings();fetchPrices();setInterval(fetchPrices,7000);
</script>
</body>
