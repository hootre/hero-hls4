<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F5F5F5;font-family:-apple-system,'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif}
:root{
  /* 헤더/네비 — 영웅문 다크 네이비 */
  --navy:#1B2D6B;--navy2:#152358;--navy-light:rgba(27,45,107,0.08);
  /* 매매 색상 */
  --red:#E31E24;--red-bg:rgba(227,30,36,0.08);
  --blue:#1264D4;--blue-bg:rgba(18,100,212,0.08);
  /* 수익/손실 — 영웅문 핫핑크 */
  --pink:#E8005A;--pink-bg:rgba(232,0,90,0.07);
  /* 레이아웃 */
  --bg:#F5F5F5;--card:#FFFFFF;
  --t1:#1A1A1A;--t2:#555555;--t3:#888888;
  --border:#EEEEEE;--border2:#D8D8D8;
  --radius:12px;--radius-sm:8px;
}
.app{max-width:420px;margin:0 auto;background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;color:var(--t1);position:relative;overflow:hidden}

/* ===== 헤더 ===== */
.header{
  background:linear-gradient(135deg,#1B2D6B 0%,#152358 100%);
  padding:0 16px;
  height:52px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;z-index:10;
  flex-shrink:0;
}
.header .logo{display:flex;align-items:center}
.header .logo img{height:36px;width:auto;object-fit:contain}
.header .hdr-right{display:flex;gap:6px;align-items:center}
.header .icon-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.header .icon-btn:active{background:rgba(255,255,255,0.2)}
.header .icon-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ===== 탭바 (상단) ===== */
.tab-bar{
  background:#fff;
  display:flex;
  border-bottom:2px solid var(--border);
  position:relative;z-index:9;
  flex-shrink:0;
}
.tab-bar button{
  flex:1;padding:12px 0 10px;
  border:none;background:transparent;
  font-size:13px;font-weight:600;
  color:var(--t3);cursor:pointer;
  font-family:inherit;
  position:relative;
  transition:color 0.15s;
}
.tab-bar button.active{color:var(--navy)}
.tab-bar button.active::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--navy);border-radius:1px 1px 0 0;
}

/* ===== 상태바 ===== */
.status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;font-size:11px;color:var(--t3);
  background:#fff;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.status-bar .live{display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== 콘텐츠 ===== */
.content{flex:1;overflow-y:auto;padding-bottom:68px;-webkit-overflow-scrolling:touch}

/* ===== 홈 — 영웅문 잔고 스타일 ===== */

/* 키움잔고/타사잔고 탭 */
.porto-tabs{
  display:flex;background:#fff;
  border-bottom:1px solid var(--border);
}
.porto-tabs button{
  flex:1;padding:11px 0;border:none;background:transparent;
  font-size:14px;font-weight:600;color:var(--t3);
  cursor:pointer;font-family:inherit;position:relative;
  transition:color 0.15s;
}
.porto-tabs button.active{color:var(--t1)}
.porto-tabs button.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--t1);
}

/* 요약 박스 */
.porto-summary{
  background:#fff;border-bottom:6px solid var(--bg);
  padding:0;
}
.porto-total{
  display:flex;align-items:center;gap:6px;
  padding:14px 16px 10px;
}
.porto-total .pt-label{font-size:13px;color:var(--t2);font-weight:500;flex-shrink:0}
.porto-total .pt-amount{font-size:20px;font-weight:800;letter-spacing:-0.5px;flex:1}
.porto-total .pt-rate{font-size:14px;font-weight:700;flex-shrink:0}
.porto-total .pt-arrow{font-size:12px;color:var(--t3);margin-left:2px}
.porto-total .up{color:var(--pink)}
.porto-total .dn{color:var(--blue)}
.porto-total .flat{color:var(--t3)}

.porto-grid{
  display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--border);
}
.porto-grid .pg-item{
  padding:9px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.porto-grid .pg-item:nth-child(odd){border-right:1px solid var(--border)}
.porto-grid .pg-item:nth-child(n+3){border-top:1px solid var(--border)}
.porto-grid .pg-label{font-size:12px;color:var(--t3)}
.porto-grid .pg-val{font-size:13px;font-weight:700;text-align:right}
.porto-grid .pg-val.up{color:var(--pink)}
.porto-grid .pg-val.dn{color:var(--blue)}

.porto-ranking{
  display:flex;align-items:center;gap:4px;
  padding:9px 16px;border-top:1px solid var(--border);
  font-size:12px;color:var(--t3);
}
.porto-ranking .pr-label{font-weight:600;color:var(--t2)}
.porto-ranking .pr-link{color:var(--t2);flex:1}
.porto-ranking .pr-refresh{font-size:14px;cursor:pointer}

/* 보유종목 테이블 */
.holdings-table{
  background:#fff;
  margin-top:0;
}
.tbl-head{
  display:grid;grid-template-columns:90px 1fr 70px 80px;
  background:#F7F7F7;border-bottom:1px solid var(--border2);
  border-top:6px solid var(--bg);
}
.tbl-head > div{padding:6px 8px}
.tbl-head .th-cell{
  display:flex;flex-direction:column;gap:1px;
  font-size:11px;color:var(--t3);font-weight:500;
  text-align:right;
}
.tbl-head .th-cell:first-child{text-align:left}

.tbl-stock{
  display:grid;grid-template-columns:90px 1fr 70px 80px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.1s;
}
.tbl-stock:active{background:#fef5f8}
.tbl-stock:last-child{border-bottom:none}

.ts-name{
  padding:10px 8px;
  display:flex;align-items:center;
  font-size:13px;font-weight:700;
  border-right:1px solid var(--border);
  word-break:keep-all;line-height:1.4;
}
.ts-col{
  display:flex;flex-direction:column;justify-content:center;
  padding:6px 8px;gap:4px;
  border-right:1px solid var(--border);
}
.ts-col:last-child{border-right:none}
.ts-col .tc-r1,.ts-col .tc-r2{
  font-size:12px;font-weight:600;text-align:right;line-height:1.3;
}
.ts-col .tc-r2{color:var(--t3);font-weight:500}
.ts-col.up .tc-r1{color:var(--pink)}
.ts-col.up .tc-r2{color:var(--pink)}
.ts-col.dn .tc-r1{color:var(--blue)}
.ts-col.dn .tc-r2{color:var(--blue)}

.tbl-empty{
  padding:40px 16px;text-align:center;
  font-size:13px;color:var(--t3);line-height:2;
}

/* ===== 종목 ===== */
.market-filter{
  display:flex;gap:0;background:#fff;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.market-filter button{
  flex:1;padding:10px 0;border:none;background:transparent;
  font-size:13px;font-weight:600;color:var(--t3);
  cursor:pointer;font-family:inherit;transition:color 0.15s;
  position:relative;
}
.market-filter button.active{color:var(--navy)}
.market-filter button.active::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2px;background:var(--navy);
}

.stock-list{padding:0 16px;margin-top:8px}
.stock-item{
  background:var(--card);border-radius:var(--radius-sm);
  margin-bottom:6px;padding:12px 14px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:background 0.1s;
}
.stock-item:active{background:#fafafa}
.stock-item .si-rank{
  width:22px;font-size:13px;font-weight:700;
  color:var(--t3);text-align:center;flex-shrink:0;
}
.stock-item .si-rank.top3{color:var(--navy)}
.stock-item .si-info{flex:1;min-width:0}
.stock-item .si-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-item .si-sub{font-size:11px;color:var(--t3);margin-top:2px}
.stock-item .si-right{text-align:right;flex-shrink:0}
.stock-item .si-price{font-size:14px;font-weight:700}
.stock-item .si-rate{font-size:12px;font-weight:600;margin-top:2px;padding:2px 6px;border-radius:4px;display:inline-block}
.si-rate.up{color:var(--pink);background:var(--pink-bg)}
.si-rate.dn{color:var(--blue);background:var(--blue-bg)}
.si-rate.flat{color:var(--t3);background:#f0f0f0}

/* ===== 매매 ===== */
.order-wrap{padding:12px 16px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{
  width:100%;padding:11px 16px 11px 40px;
  border-radius:var(--radius-sm);border:1.5px solid var(--border2);
  font-size:14px;background:var(--card);font-family:inherit;
  transition:border 0.2s;
}
.search-wrap input:focus{outline:none;border-color:var(--navy)}
.search-wrap .sw-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.search-wrap .sw-icon svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.search-results{
  background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);
  max-height:220px;overflow-y:auto;margin-bottom:12px;
}
.sr-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background 0.1s;
}
.sr-item:last-child{border-bottom:none}
.sr-item:active{background:#fef5f5}
.sr-item .sr-name{font-weight:600;font-size:13px}
.sr-item .sr-code{font-size:11px;color:var(--t3);margin-top:2px}
.sr-item .sr-price{font-weight:700;font-size:13px}

.sel-stock-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);padding:16px;margin-bottom:10px;
}
.sel-stock-card .ss-header{display:flex;justify-content:space-between;align-items:flex-start}
.sel-stock-card .ss-name{font-size:16px;font-weight:700}
.sel-stock-card .ss-code{font-size:11px;color:var(--t3);margin-top:2px}
.sel-stock-card .ss-price{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-top:8px}
.sel-stock-card .ss-chg{font-size:12px;font-weight:600;margin-top:3px}

.chart-wrap{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:10px;overflow:hidden;
}
.chart-tabs{display:flex;border-bottom:1px solid var(--border)}
.chart-tabs button{
  flex:1;padding:9px 0;border:none;background:transparent;
  font-size:12px;font-weight:600;color:var(--t3);
  cursor:pointer;font-family:inherit;transition:all 0.15s;position:relative;
}
.chart-tabs button.active{color:var(--navy)}
.chart-tabs button.active::after{
  content:'';position:absolute;bottom:0;left:15%;right:15%;
  height:2px;background:var(--navy);
}
.chart-area{padding:12px;height:180px;position:relative}
.chart-area canvas{width:100%;height:100%}
.chart-loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:12px;gap:8px}
.chart-info{display:flex;justify-content:space-between;padding:0 12px 10px;font-size:11px;color:var(--t3)}

/* 매수/매도 탭 */
.buysell-tabs{
  display:grid;grid-template-columns:1fr 1fr;
  border-radius:var(--radius-sm);overflow:hidden;
  margin-bottom:10px;border:1px solid var(--border);
}
.buysell-tabs button{
  padding:12px;border:none;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.buysell-tabs .btn-buy{background:#fff5f5;color:#FFAAAA}
.buysell-tabs .btn-buy.on{background:var(--red);color:#fff}
.buysell-tabs .btn-sell{background:#f0f5ff;color:#AABBEE}
.buysell-tabs .btn-sell.on{background:var(--blue);color:#fff}

/* 주문 폼 */
.order-type-tabs{
  display:flex;border-radius:var(--radius-sm);overflow:hidden;
  border:1px solid var(--border);margin-bottom:10px;
}
.order-type-tabs button{
  flex:1;padding:9px;border:none;background:#fff;
  font-size:12px;font-weight:600;color:var(--t3);
  cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.order-type-tabs button.active{background:var(--t1);color:#fff}

.order-form{display:flex;flex-direction:column;gap:8px}
.form-row{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.form-row label{font-size:13px;color:var(--t2);font-weight:500}
.form-row input{
  border:none;font-size:15px;text-align:right;
  font-weight:700;width:130px;background:transparent;
  font-family:inherit;color:var(--t1);
}
.form-row input:focus{outline:none}
.form-row .fv{text-align:right}
.form-row .fv-main{font-size:15px;font-weight:700}
.form-row .fv-hint{font-size:11px;color:var(--t3);margin-top:2px}

.order-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 4px;
}
.order-total .ot-label{font-size:13px;color:var(--t2);font-weight:500}
.order-total .ot-val{font-size:16px;font-weight:800;letter-spacing:-0.3px}

.order-btn{
  width:100%;padding:15px;border:none;border-radius:var(--radius-sm);
  font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  color:#fff;transition:transform 0.1s,opacity 0.1s;letter-spacing:0.3px;
}
.order-btn:active{transform:scale(0.98);opacity:0.9}

/* ===== 더보기 ===== */
.settings-wrap{padding:12px 16px}
.settings-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;margin-bottom:10px;
}
.settings-card .sc-head{
  padding:14px 16px;font-size:14px;font-weight:700;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.settings-card .sc-head::before{
  content:'';width:3px;height:14px;background:var(--navy);border-radius:2px;
}
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.settings-row:last-child{border-bottom:none}
.settings-row label{font-size:13px;color:var(--t2)}
.settings-row .srv{font-size:13px;font-weight:700}

.reset-btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  background:#FFF0F0;color:var(--red);transition:background 0.15s;
  margin-bottom:8px;
}
.reset-btn:active{background:#FFE0E0}
.reset-note{font-size:12px;color:var(--t3);line-height:1.6;padding:0 2px}

/* ===== 하단 내비 ===== */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;
  display:flex;background:rgba(255,255,255,0.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:4px 0 env(safe-area-inset-bottom,8px);
  z-index:100;
}
.bottom-nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;border:none;background:transparent;
  cursor:pointer;font-family:inherit;padding:7px 0;
}
.bottom-nav button svg{
  width:22px;height:22px;stroke:var(--t3);fill:none;
  stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke 0.15s;
}
.bottom-nav button .bnl{font-size:10px;color:var(--t3);font-weight:500;transition:color 0.15s}
.bottom-nav button.active svg{stroke:var(--navy)}
.bottom-nav button.active .bnl{color:var(--navy);font-weight:700}

/* ===== 공통 ===== */
.empty-state{
  text-align:center;padding:48px 20px;color:var(--t3);font-size:14px;line-height:2;
}
.empty-state .emp-icon{font-size:36px;margin-bottom:12px}

.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#1A1A1A;color:#fff;
  padding:10px 22px;border-radius:22px;
  font-size:13px;font-weight:500;
  opacity:0;transition:opacity 0.25s;
  pointer-events:none;white-space:nowrap;z-index:200;
}
.toast.show{opacity:1}

.loading-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;color:var(--t3);
}
.spinner{
  width:28px;height:28px;border:2.5px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin 0.7s linear infinite;margin-bottom:12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.err-page{padding:48px 24px;text-align:center}
.err-page .err-icon{font-size:44px;margin-bottom:16px}
.err-page .err-title{font-size:17px;font-weight:700;margin-bottom:8px}
.err-page .err-desc{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:24px}
.err-page .retry-btn{
  padding:12px 32px;border:none;border-radius:var(--radius-sm);
  background:var(--red);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

function drawChart(){
  const canvas=document.getElementById('stockChart');
  if(!canvas||chartData.length===0)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:12,r:12,b:26,l:12};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const closes=chartData.map(d=>d.close);
  const minP=Math.min(...closes),maxP=Math.max(...closes);
  const range=maxP-minP||1;
  ctx.clearRect(0,0,W,H);
  const isUp=closes[closes.length-1]>=closes[0];
  const lineColor=isUp?'#f04452':'#3182f6';
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,isUp?'rgba(240,68,82,0.12)':'rgba(49,130,246,0.12)');
  grad.addColorStop(1,'rgba(255,255,255,0)');
  // Fill
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();
  for(let i=0;i<closes.length;i++){
    const x=pad.l+(i/(closes.length-1))*cW;
    const y=pad.t+(1-(closes[i]-minP)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=lineColor;ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  // Labels
  ctx.fillStyle='#8b95a1';ctx.font='500 10px -apple-system,sans-serif';
  ctx.textAlign='left';ctx.fillText(F(maxP),pad.l+2,pad.t+10);

  ctx.fillText(f1,pad.l+24,H-8);ctx.fillText(f2,W-pad.r-24,H-8);
}
